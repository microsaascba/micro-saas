<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Agente - CRM Inmobiliario (Async Edge)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .status-no-contactado { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .status-contactado { background-color: #fef3c7; color: #92400e; border: 1px solid #fbbf24; }
        .status-interesado { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .status-no-interesado { background-color: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
        .note-bubble { position: relative; }
        .note-bubble::before { content: ''; position: absolute; left: -17px; top: 12px; width: 10px; height: 10px; border-radius: 50%; background: #3b82f6; border: 2px solid white; }
        .alert-row { background-color: #fff1f2; border-left: 4px solid #ef4444; }
        .loading-spinner { border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 2px solid #3b82f6; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden font-sans">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 max-w-[90%] text-center">
            <h1 class="text-3xl font-black text-blue-600 mb-1">INMO<span class="text-slate-900">CRM</span></h1>
            <p class="text-xs text-slate-500 mb-6 uppercase tracking-widest">Acceso Agentes (Edge)</p>
            
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Usuario (ej: agente_juan)" value="agente_juan" class="w-full bg-slate-50 p-3 rounded-lg border outline-none focus:border-blue-500 font-bold">
                <input id="login-pass" type="password" placeholder="Contraseña (1234)" value="1234" class="w-full bg-slate-50 p-3 rounded-lg border outline-none focus:border-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg hover:bg-blue-700 transition shadow-lg">INGRESAR</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-3 hidden font-bold">Credenciales incorrectas.</p>
        </div>
    </div>

    <div id="app-container" class="hidden h-full flex">
        <aside class="w-20 lg:w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20">
            <div class="p-6 border-b border-slate-800">
                <h1 class="hidden lg:block text-xl font-black tracking-tighter text-blue-400">AGENTE <span class="text-white">PRO</span></h1>
                <p id="agent-name-display" class="hidden lg:block text-[10px] text-slate-400 uppercase tracking-widest mt-1">-</p>
                <div class="lg:hidden text-center text-xl"><i class="fas fa-building text-blue-400"></i></div>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchTab('leads')" id="tab-btn-leads" class="w-full flex items-center justify-center lg:justify-start p-3 rounded-lg hover:bg-slate-800 transition text-blue-400 bg-slate-800">
                    <i class="fas fa-bolt lg:mr-3"></i> <span class="hidden lg:block font-semibold">Leads</span>
                </button>
                <button onclick="switchTab('cartera')" id="tab-btn-cartera" class="w-full flex items-center justify-center lg:justify-start p-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fas fa-users lg:mr-3"></i> <span class="hidden lg:block font-semibold">Mi Cartera</span>
                </button>
                <button onclick="switchTab('catalogo')" id="tab-btn-catalogo" class="w-full flex items-center justify-center lg:justify-start p-3 rounded-lg hover:bg-slate-800 transition text-yellow-400">
                    <i class="fas fa-book-open lg:mr-3"></i> <span class="hidden lg:block font-semibold text-white">Catálogo</span>
                </button>
            </nav>
            <div class="p-4 bg-slate-950 border-t border-slate-800 text-center space-y-3">
                <div class="flex items-center justify-center gap-2 mb-2">
                    <div id="db-status-dot" class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></div>
                    <span id="db-status-text" class="text-[10px] text-slate-500 uppercase font-bold hidden lg:block">Conectando...</span>
                </div>
                <button onclick="simularLeadAsync()" class="bg-blue-600 hover:bg-blue-700 p-2 rounded-lg text-xs font-bold w-full transition">
                    <i class="fas fa-magic"></i> <span class="hidden lg:inline ml-1">Simular Lead</span>
                </button>
                <button onclick="logout()" class="text-red-400 hover:text-red-300 text-xs w-full transition">
                    <i class="fas fa-sign-out-alt"></i> <span class="hidden lg:inline ml-1">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden relative">
            <header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm z-10">
                <div class="flex items-center gap-4">
                    <h2 id="view-title" class="text-lg font-bold text-slate-700 uppercase tracking-wide">Bandeja de Leads</h2>
                    <button onclick="cargarDatosAgenteAsync()" class="text-xs text-blue-500 hover:underline flex items-center gap-1">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div class="flex items-center">
                    <span class="text-sm font-semibold text-slate-600 bg-slate-100 px-4 py-2 rounded-lg border shadow-sm" id="header-date">
                        Cargando fecha...
                    </span>
                </div>
            </header>

            <div class="p-6 overflow-y-auto flex-1 pb-20">
                
                <section id="view-leads" class="space-y-4">
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 border-b text-slate-400 uppercase text-[10px] font-bold">
                                <tr>
                                    <th class="p-4 w-1/4">Cliente / Fecha de Ingreso</th>
                                    <th class="p-4 w-1/4">Inmueble Solicitado</th>
                                    <th class="p-4 w-1/4">SLA (Alerta > 5m)</th>
                                    <th class="p-4 text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="leads-list">
                                <tr><td colspan="4" class="text-center p-6 text-slate-400 text-sm">Cargando base de datos...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section id="view-cartera" class="hidden space-y-6">
                    <div id="contacts-container" class="grid grid-cols-1 gap-6"></div>
                </section>

                <section id="view-catalogo" class="hidden">
                    <div id="catalogo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </section>

            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN API (Cloudflare Pages)
        // ==========================================
        const API_URLS = {
            leads: '/api/leads',           
            propiedades: '/api/propiedades',
            notas: '/api/notas'            
        };

        let currentAgentId = null;
        let misLeads = [];
        let miCartera = [];
        let catalogoPropiedades = [];

        function setDbStatus(status) {
            const dot = document.getElementById('db-status-dot');
            const txt = document.getElementById('db-status-text');
            if(status === 'ok') {
                dot.className = "w-2 h-2 rounded-full bg-green-500";
                txt.innerText = "Online";
            } else if (status === 'error') {
                dot.className = "w-2 h-2 rounded-full bg-red-500";
                txt.innerText = "Desconectado";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-yellow-400 animate-pulse";
                txt.innerText = "Sincronizando...";
            }
        }

        // ==========================================
        // 1. AUTENTICACIÓN
        // ==========================================
        function login() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            
            if ((u === 'agente_juan' || u === 'agente_maria') && p === '1234') {
                currentAgentId = u;
                document.getElementById('agent-name-display').innerText = u === 'agente_juan' ? 'Juan Pérez' : 'María Gómez';
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                
                initAppAsync();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            currentAgentId = null;
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        // ==========================================
        // 2. COMUNICACIÓN CON CLOUDFLARE D1 (ASYNC)
        // ==========================================
        async function initAppAsync() {
            await cargarPropiedadesAsync();
            await cargarDatosAgenteAsync();
            setInterval(() => { cargarDatosAgenteAsync(); }, 30000);
        }

        async function cargarPropiedadesAsync() {
            try {
                const res = await fetch(API_URLS.propiedades);
                if(res.ok) catalogoPropiedades = await res.json();
                renderCatalogo();
            } catch (e) {
                console.error("Error catálogo:", e);
                catalogoPropiedades = [
                    { id: 'p1', nombre: 'Edificio KAIZEN', script_wa: 'Hola! Soy asesor inmobiliario. Vi tu interés en el Edificio KAIZEN...' }
                ];
            }
        }

        async function cargarDatosAgenteAsync() {
            setDbStatus('loading');
            try {
                const res = await fetch(`${API_URLS.leads}?agente_id=${currentAgentId}`);
                if (!res.ok) throw new Error('Error API');
                
                const data = await res.json();
                misLeads = data.leads || [];
                miCartera = data.contactos || [];
                
                renderVistas();
                setDbStatus('ok');
            } catch (error) {
                console.warn("API falló, usando array local para demo.");
                setDbStatus('error');
                renderVistas();
            }
        }

        async function simularLeadAsync() {
            const nuevoLead = {
                id: crypto.randomUUID(),
                nombre: "Prospecto Web #" + Math.floor(Math.random()*100),
                telefono: "549351" + Math.floor(Math.random()*9000000),
                prop_id: catalogoPropiedades[0]?.id || 'p1',
                agente_id: currentAgentId,
                estado: 'No Contactado',
                fecha_ingreso: new Date().toISOString()
            };

            misLeads.push(nuevoLead);
            renderVistas();
            if(document.getElementById('view-leads').classList.contains('hidden')) switchTab('leads');

            try {
                await fetch(API_URLS.leads, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoLead)
                });
            } catch (e) { console.error("No se pudo guardar lead en DB", e); }
        }

        async function contactarYA(id) {
            const lead = misLeads.find(l => l.id === id);
            const prop = catalogoPropiedades.find(p => p.id === lead.prop_id) || { script_wa: 'Hola!' };

            window.open(`https://wa.me/${lead.telefono}?text=${encodeURIComponent(prop.script_wa)}`, '_blank');
            
            lead.estado = 'Contactado';
            lead.notas = [{ text: "Primer contacto realizado vía WhatsApp.", time: new Date().toLocaleString() }];
            
            miCartera.unshift(lead);
            misLeads = misLeads.filter(l => l.id !== id);
            renderVistas();
            switchTab('cartera');

            try {
                await fetch(`${API_URLS.leads}?id=${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado: 'Contactado' })
                });

                await fetch(API_URLS.notas, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lead_id: id, nota: "Primer contacto realizado vía WhatsApp." })
                });
            } catch (e) { console.error("Error al actualizar estado en BD", e); }
        }

        async function cambiarEstadoAsync(id, nuevoEstado) {
            if(!confirm(`¿Pasar este cliente a estado: "${nuevoEstado}"?`)) { renderVistas(); return; }
            
            const contacto = miCartera.find(c => c.id === id);
            contacto.estado = nuevoEstado;
            const logNota = `Estado cambiado a: ${nuevoEstado}`;
            if(!contacto.notas) contacto.notas = [];
            contacto.notas.unshift({ text: logNota, time: new Date().toLocaleString() });
            
            renderVistas();

            try {
                await fetch(`${API_URLS.leads}?id=${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado: nuevoEstado })
                });
                await fetch(API_URLS.notas, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lead_id: id, nota: logNota })
                });
            } catch (e) { console.error("Error", e); }
        }

        async function addNotaAsync(contactId) {
            const input = document.getElementById(`input-note-${contactId}`);
            const texto = input.value.trim();
            if(!texto) return;

            const btn = document.getElementById(`btn-note-${contactId}`);
            btn.innerHTML = '<span class="loading-spinner"></span>';

            const contacto = miCartera.find(c => c.id === contactId);
            if(!contacto.notas) contacto.notas = [];
            
            contacto.notas.unshift({ text: texto, time: new Date().toLocaleString() });
            input.value = '';
            renderVistas(); 

            try {
                await fetch(API_URLS.notas, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lead_id: contactId, nota: texto })
                });
            } catch (e) { console.error("Error nota", e); }
        }

        // ==========================================
        // 3. RENDERIZADO UI
        // ==========================================
        function renderVistas() {
            renderLeads();
            renderCartera();
        }

        function renderLeads() {
            const list = document.getElementById('leads-list');
            list.innerHTML = '';
            
            if(misLeads.length === 0) {
                list.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-400 font-bold"><i class="fas fa-check-circle text-green-500 mb-2 text-2xl block"></i>¡Bandeja al día! No hay leads pendientes.</td></tr>`;
                return;
            }

            misLeads.forEach(l => {
                const prop = catalogoPropiedades.find(p => p.id === l.prop_id) || { nombre: 'Consulta General' };
                const dateObj = new Date(l.fecha_ingreso);
                
                // Formateo de fecha y hora completos (Ej: 09/04/2026, 10:15)
                const opcionesFecha = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' };
                const fechaFormat = isNaN(dateObj) ? 'Ahora' : dateObj.toLocaleString('es-AR', opcionesFecha);
                
                const minutos = isNaN(dateObj) ? 0 : Math.floor((new Date() - dateObj)/60000);
                
                const isAlert = minutos >= 5;
                const rowClass = isAlert ? 'alert-row' : 'hover:bg-slate-50 border-b border-slate-100';
                const timeHtml = isAlert 
                    ? `<span class="text-red-600 font-black animate-pulse"><i class="fas fa-exclamation-triangle mr-1"></i> ${minutos} min en espera</span>`
                    : `<span class="text-slate-500 font-semibold">${minutos} min</span>`;

                list.innerHTML += `
                    <tr class="${rowClass} transition-colors">
                        <td class="p-4">
                            <div class="font-bold text-slate-800 text-base">${l.nombre}</div>
                            <div class="text-[11px] text-slate-500 mt-1 font-semibold"><i class="far fa-calendar-alt"></i> ${fechaFormat}</div>
                        </td>
                        <td class="p-4"><span class="bg-blue-50 border border-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm">${prop.nombre}</span></td>
                        <td class="p-4 text-sm">${timeHtml}</td>
                        <td class="p-4 text-center">
                            <button onclick="contactarYA('${l.id}')" title="Contactar" class="inline-flex items-center justify-center w-10 h-10 bg-[#25D366] hover:bg-[#1DA851] text-white rounded-full shadow-md transition-all transform hover:scale-110">
                                <i class="fab fa-whatsapp text-xl"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function renderCartera() {
            const cont = document.getElementById('contacts-container');
            cont.innerHTML = '';
            
            if(miCartera.length === 0) {
                cont.innerHTML = `<div class="p-8 text-center text-slate-400 font-bold bg-white rounded-xl border">Aún no tienes contactos en gestión.</div>`;
                return;
            }

            miCartera.forEach(c => {
                const propOptions = catalogoPropiedades.map(p => `<option value="${p.id}" ${c.prop_id === p.id ? 'selected' : ''}>${p.nombre}</option>`).join('');
                const notasHTML = (c.notas || []).map((n, idx) => `
                    <div class="note-bubble ml-5 ${idx === 0 ? 'opacity-100' : 'opacity-80'}">
                        <p class="text-[10px] text-slate-400 font-bold mb-0.5">${n.time}</p>
                        <p class="text-sm text-slate-700 bg-slate-50 p-3 rounded-lg border border-slate-100 inline-block w-full shadow-sm">${n.text}</p>
                    </div>
                `).join('');

                cont.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col lg:flex-row">
                        <div class="w-full lg:w-1/3 p-6 bg-slate-50 border-r border-slate-200">
                            <div class="flex items-center gap-4 mb-6 pb-6 border-b border-slate-200">
                                <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-2xl shadow-sm">${c.nombre[0]}</div>
                                <div>
                                    <h3 class="font-black text-slate-800 text-lg leading-tight">${c.nombre}</h3>
                                    <a href="https://wa.me/${c.telefono}" target="_blank" class="text-xs text-blue-600 font-bold hover:underline mt-1 block"><i class="fab fa-whatsapp"></i> ${c.telefono}</a>
                                </div>
                            </div>
                            <div class="space-y-5">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Estado</label>
                                    <select onchange="cambiarEstadoAsync('${c.id}', this.value)" class="w-full p-2.5 rounded-lg border font-bold text-sm status-${c.estado.toLowerCase().replace(' ','-')} outline-none shadow-sm cursor-pointer">
                                        <option ${c.estado === 'Contactado' ? 'selected':''}>Contactado</option>
                                        <option ${c.estado === 'Interesado' ? 'selected':''}>Interesado</option>
                                        <option ${c.estado === 'No Interesado' ? 'selected':''}>No Interesado</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Inmueble</label>
                                    <select disabled class="w-full p-2.5 rounded-lg border font-bold text-sm text-slate-500 bg-gray-100 outline-none shadow-sm">
                                        ${propOptions}
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="flex-1 p-6 flex flex-col bg-white">
                            <h4 class="font-bold text-slate-800 text-sm mb-4"><i class="far fa-comments mr-2 text-blue-500"></i>Bitácora D1</h4>
                            <div class="flex gap-2 mb-6">
                                <input id="input-note-${c.id}" type="text" placeholder="Escribir nota..." class="flex-1 bg-slate-100 border border-slate-200 p-3 rounded-lg text-sm focus:bg-white focus:ring-2 ring-blue-500 outline-none transition">
                                <button id="btn-note-${c.id}" onclick="addNotaAsync('${c.id}')" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold text-xs hover:bg-blue-700 shadow-md transition w-24">
                                    GUARDAR
                                </button>
                            </div>
                            <div class="flex-1 space-y-5 max-h-[300px] overflow-y-auto pr-3 ml-4 border-l-2 border-slate-100 pt-2">
                                ${notasHTML}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderCatalogo() {
            const grid = document.getElementById('catalogo-grid');
            grid.innerHTML = '';
            catalogoPropiedades.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition">
                        <h4 class="font-black text-slate-800 text-lg leading-tight mb-2">${p.nombre}</h4>
                        <p class="text-xl font-bold text-green-600 mb-4">${p.precio || '-'}</p>
                        <p class="text-sm text-slate-600 mb-4">${p.descripcion || '-'}</p>
                        <div class="bg-blue-50 p-3 rounded-lg text-xs border border-blue-100">
                            <span class="font-bold text-blue-600 block mb-1">Script WA:</span>
                            <span class="italic text-slate-600">${p.script_wa}</span>
                        </div>
                    </div>
                `;
            });
        }

        // ==========================================
        // 4. UTILIDADES (Navegación y Reloj)
        // ==========================================
        function switchTab(tab) {
            document.getElementById('view-leads').classList.toggle('hidden', tab !== 'leads');
            document.getElementById('view-cartera').classList.toggle('hidden', tab !== 'cartera');
            document.getElementById('view-catalogo').classList.toggle('hidden', tab !== 'catalogo');
            
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('bg-slate-800', 'text-blue-400', 'text-yellow-400');
                b.classList.add('text-white');
            });
            
            const activeBtn = document.getElementById(`tab-btn-${tab}`);
            activeBtn.classList.add('bg-slate-800', tab === 'catalogo' ? 'text-yellow-400' : 'text-blue-400');
            activeBtn.classList.remove('text-white');

            const titles = { leads: 'Bandeja de Leads', cartera: 'Mi Cartera D1', catalogo: 'Catálogo Sincronizado' };
            document.getElementById('view-title').innerText = titles[tab];
        }

        setInterval(() => {
            const date = new Date();
            let text = date.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            document.getElementById('header-date').innerText = text.charAt(0).toUpperCase() + text.slice(1);
        }, 1000);

    </script>
</body>
</html>
