<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso | Micro SaaS</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, #f0f2f7 0%, #e2e8f0 100%);
      margin: 0; font-family: var(--font, 'DM Sans', sans-serif);
    }
    .login-wrapper { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }
    .login-card {
      background: var(--panel, #ffffff); padding: 40px 32px; border-radius: 24px;
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.08); border: 1px solid var(--line, #e2e8f0); text-align: center;
    }
    .login-logo {
      width: 64px; height: 64px; background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 18px; margin: 0 auto 24px; display: grid; place-items: center;
      color: #ffffff; font-size: 28px; font-weight: 800; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
    }
    .login-card h1 { margin: 0 0 8px; font-size: 26px; color: var(--text, #0f172a); font-weight: 800; letter-spacing: -0.03em; }
    .login-card p { color: var(--muted, #64748b); font-size: 14px; line-height: 1.5; margin: 0 0 32px; padding: 0 10px; }
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .form-group input {
      width: 100%; padding: 14px 16px; border: 1px solid var(--line, #cbd5e1); border-radius: 12px;
      background: #ffffff; color: var(--text, #0f172a); font-family: inherit; font-size: 14px; box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); outline: none; }
    .btn-login {
      width: 100%; background: var(--primary, #2563eb); color: #ffffff; border: none; padding: 15px;
      border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25); margin-top: 8px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35); }
    .support-link { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--line, #e2e8f0); font-size: 13px; color: var(--muted, #64748b); }
    .support-link a { color: #25D366; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-left: 4px; transition: opacity 0.2s; }
    .support-link a:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">M</div>
      <h1>Bienvenido al sistema</h1>
      <p>Ingrese sus credenciales operativas para acceder.</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label>Nombre de Usuario</label>
          <input type="text" id="loginUsername" placeholder="Ej: admin o caja1" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="loginPassword" placeholder="Ingrese su contraseña" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login">Ingresar al Sistema</button>
      </form>

      <div class="support-link">
        ¿Necesitás ayuda? 
        <a href="https://wa.me/5493516506955" target="_blank">
          <span>💬</span> Escribinos
        </a>
      </div>
    </div>
  </div>

  <script src="core.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const btn = document.querySelector('.btn-login');
      
      btn.textContent = "Verificando...";
      btn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (res.ok) {
          const data = await res.json();
          // Guardamos los datos de la sesión real
          localStorage.setItem('saas_logged_in', 'true');
          localStorage.setItem('saas_username', data.user.username);
          localStorage.setItem('saas_role', data.user.role);
          
          // Redirigimos según el rol
          if (data.user.role === 'pos') {
            window.location.href = 'ventas.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } else {
          alert("Usuario o contraseña incorrectos.");
          btn.textContent = "Ingresar al Sistema";
          btn.disabled = false;
        }
      } catch (error) {
        alert("Error de conexión con el servidor. Revisá tu internet.");
        btn.textContent = "Ingresar al Sistema";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
    });
  </script>
</body>
</html>
