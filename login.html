<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingreso | Micro SaaS</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { 
      height: 100%; margin: 0; padding: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      display: flex; justify-content: center; align-items: center;
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    .login-card {
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 360px;
      text-align: center;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-logo-large {
      background: var(--primary, #2563eb);
      color: white;
      width: 60px; height: 60px;
      border-radius: 14px;
      display: flex; justify-content: center; align-items: center;
      font-size: 28px; font-weight: 900;
      margin: 0 auto 20px auto;
      overflow: hidden;
    }

    .brand-logo-large img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: white;
    }

    .login-title { margin: 0 0 5px; font-size: 22px; color: var(--text, #1e293b); }
    .login-sub { margin: 0 0 30px; font-size: 14px; color: var(--muted, #64748b); }

    .input-group { text-align: left; margin-bottom: 20px; }
    .input-group label { display: block; font-size: 12px; font-weight: 700; color: var(--muted, #64748b); margin-bottom: 6px; text-transform: uppercase; }
    .input-box { width: 100%; padding: 14px; border: 2px solid var(--line, #e2e8f0); border-radius: 10px; font-size: 15px; outline: none; transition: 0.2s; box-sizing: border-box; }
    .input-box:focus { border-color: var(--primary, #2563eb); }

    .btn-login { width: 100%; padding: 16px; font-size: 16px; font-weight: bold; background: var(--primary, #2563eb); color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; }
    .btn-login:hover { background: #1d4ed8; }
    .btn-login:disabled { background: var(--muted, #64748b); cursor: not-allowed; }

    #errorMsg { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 20px; display: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="brand-logo-large" id="brandBox">M</div>
    <h1 class="login-title">Bienvenido</h1>
    <p class="login-sub">Ingresá tus credenciales para continuar</p>

    <div id="errorMsg"></div>

    <form id="loginForm" onsubmit="procesarLogin(event)">
      <div class="input-group">
        <label>Usuario</label>
        <input type="text" id="username" class="input-box" required placeholder="Ej: admin" autofocus>
      </div>
      
      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="password" class="input-box" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn-login" id="btnSubmit">Ingresar al sistema</button>
    </form>
  </div>

  <script>
    function clearSession() {
      const keys = [
        'activeUser',
        'userRole',
        'allowedModules',
        'company_id',
        'company_name',
        'company_logo',
        'company_cuil',
        'company_email',
        'company_phone',
        'company_address',
        'company_city',
        'company_country',
        'company_iva_condition',
        'saas_logged_in',
        'saas_username',
        'saas_role'
      ];
      keys.forEach(k => localStorage.removeItem(k));
    }

    function resolveTargetPage(user) {
      let targetPage = 'dashboard.html';

      if (user.role === 'administrativo') targetPage = 'contable.html';
      if (user.role === 'cajera' || user.role === 'vendedora' || user.role === 'pos') targetPage = 'facturacion.html';

      const moduleName = targetPage.replace('.html', '');

      if (user.role !== 'admin' && Array.isArray(user.allowedModules) && !user.allowedModules.includes(moduleName)) {
        if (user.allowedModules.length > 0) {
          targetPage = user.allowedModules[0] + '.html';
        } else {
          return null;
        }
      }

      return targetPage;
    }

    function hydrateCompanyUI(company) {
      if (!company) return;
      if (company.logo) {
        document.getElementById('brandBox').innerHTML = `<img src="${company.logo}" alt="Logo empresa">`;
      }
    }

    async function procesarLogin(e) {
      e.preventDefault();
      
      const btn = document.getElementById('btnSubmit');
      const errorMsg = document.getElementById('errorMsg');
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();

      btn.disabled = true;
      btn.textContent = "Verificando...";
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          clearSession();

         const user = data.user || {};
const company = data.company || {};
const warning = data.warning || null;
const license = data.license || null;

localStorage.setItem('activeUser', user.username || '');
localStorage.setItem('userRole', user.role || '');
localStorage.setItem('allowedModules', JSON.stringify(user.allowedModules || []));
localStorage.setItem('company_id', user.company_id || '');
localStorage.setItem('saas_logged_in', 'true');

localStorage.setItem('saas_username', user.username || '');
localStorage.setItem('saas_role', user.role || '');

localStorage.setItem('company_name', company.name || '');
localStorage.setItem('company_logo', company.logo || '');
localStorage.setItem('company_cuil', company.cuil || '');
localStorage.setItem('company_email', company.email || '');
localStorage.setItem('company_phone', company.phone || '');
localStorage.setItem('company_address', company.address || '');
localStorage.setItem('company_city', company.city || '');
localStorage.setItem('company_country', company.country || '');
localStorage.setItem('company_iva_condition', company.ivaCondition || '');

localStorage.setItem('license_due_date', license?.dueDate || '');
localStorage.setItem('license_days_to_due', license?.daysToDue ?? '');
localStorage.setItem('license_days_past_due', license?.daysPastDue ?? '');
localStorage.setItem('license_warning', warning ? JSON.stringify(warning) : '');

hydrateCompanyUI(company);

if (warning) {
  errorMsg.textContent = warning.message;
  errorMsg.style.display = 'block';
  errorMsg.style.background = warning.type === 'grace_period' ? '#fff7ed' : '#fef3c7';
  errorMsg.style.color = warning.type === 'grace_period' ? '#c2410c' : '#92400e';
}

          const targetPage = resolveTargetPage(user);

          if (!targetPage) {
            errorMsg.textContent = "Tu usuario no tiene ningún módulo asignado.";
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = "Ingresar al sistema";
            btn.style.background = "";
            clearSession();
            return;
          }

          btn.style.background = "#16a34a";
          btn.textContent = "¡Acceso Autorizado!";

          setTimeout(() => {
            window.location.href = targetPage;
          }, 500);

        } else {
          clearSession();
          errorMsg.textContent = data.error || "Error desconocido.";
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = "Ingresar al sistema";
        }
      } catch (error) {
        clearSession();
        errorMsg.textContent = "Error de red. Verificá tu conexión.";
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = "Ingresar al sistema";
      }
    }
  </script>
</body>
</html>
