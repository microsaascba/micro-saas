<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingreso | Micro SaaS</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { 
      height: 100%; margin: 0; padding: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      display: flex; justify-content: center; align-items: center;
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    .login-card {
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 360px;
      text-align: center;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-logo-large {
      background: var(--primary);
      color: white;
      width: 60px; height: 60px;
      border-radius: 14px;
      display: flex; justify-content: center; align-items: center;
      font-size: 28px; font-weight: 900;
      margin: 0 auto 20px auto;
    }

    .login-title { margin: 0 0 5px; font-size: 22px; color: var(--text); }
    .login-sub { margin: 0 0 30px; font-size: 14px; color: var(--muted); }

    .input-group { text-align: left; margin-bottom: 20px; }
    .input-group label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
    .input-box { width: 100%; padding: 14px; border: 2px solid var(--line); border-radius: 10px; font-size: 15px; outline: none; transition: 0.2s; box-sizing: border-box; }
    .input-box:focus { border-color: var(--primary); }

    .btn-login { width: 100%; padding: 16px; font-size: 16px; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; }
    .btn-login:hover { background: #1d4ed8; }
    .btn-login:disabled { background: var(--muted); cursor: not-allowed; }

    #errorMsg { color: var(--danger); background: var(--danger-soft); padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 20px; display: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="brand-logo-large">M</div>
    <h1 class="login-title">Bienvenido</h1>
    <p class="login-sub">Ingresá tus credenciales para continuar</p>

    <div id="errorMsg"></div>

    <form id="loginForm" onsubmit="procesarLogin(event)">
      <div class="input-group">
        <label>Usuario</label>
        <input type="text" id="username" class="input-box" required placeholder="Ej: admin" autofocus>
      </div>
      
      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="password" class="input-box" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn-login" id="btnSubmit">Ingresar al sistema</button>
    </form>
  </div>

  <script>
   async function procesarLogin(e) {
      e.preventDefault();
      
      const btn = document.getElementById('btnSubmit');
      const errorMsg = document.getElementById('errorMsg');
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();

      btn.disabled = true;
      btn.textContent = "Verificando...";
      errorMsg.style.display = 'none';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // GUARDAMOS LA LLAVE DE ACCESO EN EL NAVEGADOR
          localStorage.setItem('activeUser', data.user.username);
          localStorage.setItem('userRole', data.user.role);
          localStorage.setItem('allowedModules', JSON.stringify(data.user.allowedModules));
          
          btn.style.background = "var(--success)";
          btn.textContent = "¡Acceso Autorizado!";
          
          // --- LÓGICA DE REDIRECCIÓN INTELIGENTE ---
          let targetPage = 'dashboard.html';
          if (data.user.role === 'administrativo') targetPage = 'contable.html';
          if (data.user.role === 'cajera' || data.user.role === 'vendedora' || data.user.role === 'pos') targetPage = 'facturacion.html';

          // Seguridad: si el rol no es admin y le destildaron su módulo principal,
          // lo mandamos al primer módulo que tenga tildado en su lista de permisos.
          const moduleName = targetPage.replace('.html', '');
          if (data.user.role !== 'admin' && data.user.allowedModules && !data.user.allowedModules.includes(moduleName)) {
              if (data.user.allowedModules.length > 0) {
                  targetPage = data.user.allowedModules[0] + '.html';
              }
          }
          
          // Redirigimos al módulo que le corresponde
          setTimeout(() => { window.location.href = targetPage; }, 500);
        } else {
          errorMsg.textContent = data.error || "Error desconocido.";
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = "Ingresar al sistema";
        }
      } catch (error) {
        errorMsg.textContent = "Error de red. Verificá tu conexión.";
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = "Ingresar al sistema";
      }
    }

        const data = await response.json();

        if (response.ok && data.success) {
          // GUARDAMOS LA LLAVE DE ACCESO EN EL NAVEGADOR
          localStorage.setItem('activeUser', data.user.username);
          localStorage.setItem('userRole', data.user.role);
          localStorage.setItem('allowedModules', JSON.stringify(data.user.allowedModules));
          
          btn.style.background = "var(--success)";
          btn.textContent = "¡Acceso Autorizado!";
          
          // Redirigimos al panel
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
        } else {
          errorMsg.textContent = data.error || "Error desconocido.";
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = "Ingresar al sistema";
        }
      } catch (error) {
        errorMsg.textContent = "Error de red. Verificá tu conexión.";
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = "Ingresar al sistema";
      }
    }
  </script>
</body>
</html>
