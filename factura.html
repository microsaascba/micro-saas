<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comprobante de Venta</title>
  <style>
    /* Estilos minimalistas optimizados para impresora A4 */
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
    
    body { font-family: Arial, sans-serif; color: #000; background: #fff; margin: 0; padding: 40px; font-size: 14px; }
    .invoice-box { max-width: 800px; margin: auto; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 30px; }
    .title h1 { margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
    .title p { margin: 5px 0 0; color: #555; }
    .meta-data { text-align: right; }
    .meta-data table { width: 100%; border-collapse: collapse; }
    .meta-data td { padding: 4px 8px; }
    .meta-data td:first-child { font-weight: bold; text-align: right; }
    
    .items-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
    .items-table th { background: #f0f0f0; border-bottom: 2px solid #000; border-top: 2px solid #000; padding: 12px 8px; text-align: left; font-size: 12px; text-transform: uppercase; }
    .items-table td { padding: 12px 8px; border-bottom: 1px solid #ccc; vertical-align: middle; }
    .items-table th.num, .items-table td.num { text-align: right; font-family: 'DM Mono', monospace; }
    
    .totals { width: 50%; float: right; }
    .totals table { width: 100%; border-collapse: collapse; }
    .totals td { padding: 8px; text-align: right; border-bottom: 1px solid #eee; }
    .totals td:first-child { font-weight: bold; width: 60%; }
    .totals tr.grand-total td { font-size: 18px; font-weight: bold; border-top: 2px solid #000; border-bottom: none; }
    
    .footer { clear: both; margin-top: 50px; text-align: center; color: #555; font-size: 12px; border-top: 1px solid #ccc; padding-top: 20px; }
    
    /* Reglas exclusivas para cuando se abre la ventana de imprimir */
    @media print {
      body { padding: 0; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>

  <div class="no-print" style="margin-bottom: 20px; text-align: right;">
    <button onclick="window.print()" style="padding: 10px 20px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold;">🖨️ Imprimir Comprobante</button>
    <button onclick="window.close()" style="padding: 10px 20px; background: #fff; color: #000; border: 1px solid #000; cursor: pointer; margin-left: 10px;">Cerrar</button>
  </div>

  <div class="invoice-box" id="invoiceContent">
    Cargando comprobante...
  </div>

  <script src="core.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Leer el ID de la venta desde la URL (ej: factura.html?id=sale_123)
      const urlParams = new URLSearchParams(window.location.search);
      const saleId = urlParams.get('id');

      if (!saleId) {
        document.getElementById('invoiceContent').innerHTML = '<h2>Error: No se especificó número de comprobante.</h2>';
        return;
      }

      const sales = getData(KEYS.sales, []);
      const sale = sales.find(s => s.id === saleId);

      if (!sale) {
        document.getElementById('invoiceContent').innerHTML = '<h2>Error: Comprobante no encontrado en la base de datos.</h2>';
        return;
      }

      // Formatear datos
      const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });
      const fecha = new Date(sale.createdAt || sale.date).toLocaleString('es-AR', { dateStyle: 'short', timeStyle: 'short' });
      
      const itemsHtml = (sale.items || []).map(item => `
        <tr>
          <td>${escapeHtml(item.code || '-')}</td>
          <td><strong>${escapeHtml(item.name)}</strong></td>
          <td class="num">${item.quantity}</td>
          <td class="num">${fmt.format(item.price)}</td>
          <td class="num">${item.discount > 0 ? fmt.format(item.discount) : '-'}</td>
          <td class="num"><strong>${fmt.format(item.subtotal || (item.price * item.quantity))}</strong></td>
        </tr>
      `).join('');

      // Construir el HTML del documento
      document.getElementById('invoiceContent').innerHTML = `
        <div class="header">
          <div class="title">
            <h1>DOCUMENTO NO VÁLIDO COMO FACTURA</h1>
            <p>Comprobante de Operación Interna</p>
          </div>
          <div class="meta-data">
            <table>
              <tr><td>COMPROBANTE:</td><td>${sale.code || 'S/N'}</td></tr>
              <tr><td>FECHA:</td><td>${fecha}</td></tr>
              <tr><td>MÉTODO PAGO:</td><td>${sale.paymentMethod || 'N/D'}</td></tr>
            </table>
          </div>
        </div>

        <table class="items-table">
          <thead>
            <tr>
              <th style="width: 15%">CÓDIGO</th>
              <th style="width: 40%">DESCRIPCIÓN</th>
              <th class="num" style="width: 10%">CANT.</th>
              <th class="num" style="width: 15%">PRECIO UNIT.</th>
              <th class="num" style="width: 10%">DTO.</th>
              <th class="num" style="width: 10%">SUBTOTAL</th>
            </tr>
          </thead>
          <tbody>
            ${itemsHtml}
          </tbody>
        </table>

        <div class="totals">
          <table>
            <tr><td>Subtotal Operación:</td><td>${fmt.format(sale.subtotal || sale.total)}</td></tr>
            <tr><td>Descuento Global Aplicado:</td><td style="color: #555;">- ${fmt.format(sale.globalDiscount || 0)}</td></tr>
            <tr class="grand-total"><td>TOTAL FINAL:</td><td>${fmt.format(sale.total)}</td></tr>
          </table>
        </div>

        <div class="footer">
          Generado automáticamente por el sistema de gestión. 
        </div>
      `;

      // Lanzar cuadro de impresión automáticamente al abrir
      setTimeout(() => { window.print(); }, 500);
    });
  </script>
</body>
</html>
