<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket de Venta</title>
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      margin: 0;
      padding: 10px;
      width: 80mm; /* Tamaño estándar de comandera */
      background: #fff;
      color: #000;
    }
    .header { text-align: center; margin-bottom: 15px; }
    .header strong { font-size: 18px; display: block; }
    
    .info { margin-bottom: 10px; font-size: 12px; }
    .divider { border-top: 1px dashed #000; margin: 8px 0; }
    
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; }
    td { padding: 4px 0; vertical-align: top; }
    
    .totals { margin-top: 10px; }
    .total-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .grand-total { font-size: 18px; font-weight: bold; margin-top: 5px; }
    
    .footer { text-align: center; margin-top: 20px; font-size: 11px; }

    /* Botones de control fuera de la impresión */
    .no-print {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 10px;
    }
    .btn {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-family: sans-serif;
    }
    .btn-back { background: #334155; color: white; }
    .btn-print { background: #10b981; color: white; }

    @media print {
      .no-print { display: none; }
      body { width: 100%; padding: 0; }
    }
  </style>
</head>
<body>

  <div class="no-print">
    <button class="btn btn-back" onclick="window.location.href='facturacion.html'">← Volver a Facturar</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ Re-Imprimir</button>
  </div>

  <div class="header">
    <strong>MICRO SAAS SOLUCIONES</strong>
    <small>Córdoba, Argentina</small><br>
    <small>Ticket de Venta No Válido como Factura</small>
  </div>

  <div class="info">
    <div id="printId">Orden: #</div>
    <div id="printDate">Fecha: </div>
    <div id="printClient">Cliente: </div>
  </div>

  <div class="divider"></div>

  <table>
    <thead>
      <tr>
        <th style="width: 15%;">Cant</th>
        <th style="width: 55%;">Producto</th>
        <th style="width: 30%; text-align: right;">Total</th>
      </tr>
    </thead>
    <tbody id="printItems"></tbody>
  </table>

  <div class="divider"></div>

  <div class="totals">
    <div class="total-row">
      <span>SUBTOTAL:</span>
      <span id="printSubtotal">$0</span>
    </div>
    <div class="total-row">
      <span>DESCUENTOS:</span>
      <span id="printDiscount">-$0</span>
    </div>
    <div class="total-row grand-total">
      <span>TOTAL:</span>
      <span id="printTotal">$0</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="info">
    <div>Método: <span id="printMethod"></span></div>
    <div id="printCuponRow" style="display:none;">Cupón: <span id="printCupon"></span></div>
  </div>

  <div class="footer">
    ¡Gracias por su compra!<br>
    Esperamos verte pronto.
  </div>

  <script>
    function currency(n) { return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(n || 0); }

    // Cargar datos de la venta
    const venta = JSON.parse(localStorage.getItem('last_sale_to_print'));

    if (!venta) {
      alert("No hay datos de venta para mostrar.");
      window.location.href = 'facturacion.html';
    } else {
      document.getElementById('printId').textContent = "Ticket: #" + venta.id.split('_')[1];
      document.getElementById('printDate').textContent = "Fecha: " + new Date(venta.createdAt).toLocaleString('es-AR');
      document.getElementById('printClient').textContent = "Cliente: " + (venta.client || 'Consumidor Final');
      
      const itemsBody = document.getElementById('printItems');
      venta.items.forEach(i => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i.qty}</td>
          <td>${i.name.substring(0,25)}</td>
          <td style="text-align: right;">${currency(i.subtotal)}</td>
        `;
        itemsBody.appendChild(tr);
      });

      document.getElementById('printSubtotal').textContent = currency(venta.subtotal);
      document.getElementById('printDiscount').textContent = "-" + currency(venta.promoDiscount);
      document.getElementById('printTotal').textContent = currency(venta.total);
      document.getElementById('printMethod').textContent = venta.method;

      if (venta.cupon) {
        document.getElementById('printCuponRow').style.display = 'block';
        document.getElementById('printCupon').textContent = venta.cupon;
      }

      // Auto-imprimir al cargar
      window.onload = () => {
        setTimeout(() => {
          window.print();
        }, 500);
      };
    }
  </script>
</body>
</html>
