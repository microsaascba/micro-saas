<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Online | Micro SaaS</title>
    <style>
        /* ==========================================================================
           1. VARIABLES Y RESETEO BÁSICO
           ========================================================================== */
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }

        /* ==========================================================================
           2. HEADER Y NAVEGACIÓN
           ========================================================================== */
        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .store-logo h1 { font-size: 22px; font-weight: 800; color: var(--text-main); }
        .store-logo span { color: var(--primary); }

        .cart-icon {
            position: relative;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-main);
        }
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background-color: var(--primary);
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50px;
        }

        /* ==========================================================================
           3. CATÁLOGO (GRILLA DE PRODUCTOS)
           ========================================================================== */
        main { padding: 40px 5%; max-width: 1200px; margin: 0 auto; min-height: 80vh; }
        
        .section-title { margin-bottom: 30px; font-size: 24px; font-weight: 700; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #f1f5f9;
            border-bottom: 1px solid var(--border-color);
        }

        .product-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-category { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        .product-name { font-size: 16px; font-weight: 600; margin-bottom: 10px; line-height: 1.3; }
        .product-price { font-size: 20px; font-weight: 800; color: var(--primary); margin-top: auto; margin-bottom: 15px; }

        .btn-add {
            width: 100%;
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add:hover { background-color: var(--primary); }

        /* Loader */
        .loader { text-align: center; padding: 50px; font-size: 18px; color: var(--text-muted); grid-column: 1 / -1; }
    </style>
</head>
<body>

    <header>
        <div class="store-logo">
            <h1 id="storeName">Mi <span>Tienda</span></h1>
        </div>
        <button class="cart-icon" onclick="toggleCart()">
            🛒
            <span class="cart-badge" id="cartCount">0</span>
        </button>
    </header>

    <main>
        <h2 class="section-title">Nuestros Productos</h2>
        <div class="products-grid" id="productsGrid">
            <div class="loader">Cargando catálogo en tiempo real...</div>
        </div>
    </main>

    <script>
        // ==========================================================================
        // LÓGICA DEL E-COMMERCE NATIVO
        // ==========================================================================
        
        let catalog = [];
        let cart = JSON.parse(localStorage.getItem('web_cart')) || [];

        // 1. Obtener el ID de la empresa por la URL (Ej: tienda.html?store=cli_kb2i7oz)
        const urlParams = new URLSearchParams(window.location.search);
        const storeId = urlParams.get('store');

        // Formateador de moneda argentina
        const currency = (num) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(num || 0);

        async function initStore() {
            updateCartBadge();
            
            if (!storeId) {
                document.getElementById('productsGrid').innerHTML = '<div class="loader">⚠️ Error: No se especificó la tienda (Falta ?store=ID en la URL)</div>';
                return;
            }

            try {
                // Le pegamos directo a tu API. El header 'x-company-id' es vital por tu arquitectura Multi-Tenant.
                const response = await fetch('/api/products', {
                    method: 'GET',
                    headers: { 'x-company-id': storeId }
                });

                if (!response.ok) throw new Error('Error al cargar productos');
                
                catalog = await response.json();
                renderCatalog(catalog);

            } catch (error) {
                console.error(error);
                document.getElementById('productsGrid').innerHTML = '<div class="loader">❌ Hubo un problema al cargar el catálogo.</div>';
            }
        }

        function renderCatalog(products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            // Filtramos solo los que están activos y tienen stock
            const availableProducts = products.filter(p => p.status !== 'Inactivo' && p.stock > 0);

            if (availableProducts.length === 0) {
                grid.innerHTML = '<div class="loader">No hay productos disponibles por el momento.</div>';
                return;
            }

            availableProducts.forEach(prod => {
                // Usamos la imagen 1 que agregamos en el módulo de productos, o un placeholder gris si no tiene
                const imgSrc = prod.image1 || 'data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22250%22%20height%3D%22200%22%20style%3D%22background%3A%23e2e8f0%22%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20font-family%3D%22sans-serif%22%20font-size%3D%2214px%22%20fill%3D%22%2394a3b8%22%3ESin%20Imagen%3C%2Ftext%3E%3C%2Fsvg%3E';

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${imgSrc}" alt="${prod.name}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <span class="product-category">${prod.category || 'General'}</span>
                        <h3 class="product-name">${prod.name}</h3>
                        <p class="product-price">${currency(prod.price)}</p>
                        <button class="btn-add" onclick="addToCart('${prod.id}')">Agregar al Carrito</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function addToCart(productId) {
            const product = catalog.find(p => p.id === productId);
            if (!product) return;

            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    qty: 1
                });
            }

            localStorage.setItem('web_cart', JSON.stringify(cart));
            updateCartBadge();
            
            // Feedback visual simple
            alert(`¡${product.name} agregado al carrito!`);
        }

        function updateCartBadge() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function toggleCart() {
            // Aquí luego abriremos el panel lateral del Checkout
            alert("En el próximo paso abriremos el panel de Checkout con tus " + cart.length + " productos distintos.");
        }

        // Arrancamos la tienda
        initStore();
    </script>
</body>
</html>
