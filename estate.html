<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Agente - CRM Inmobiliario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .status-no-contactado { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .status-contactado { background-color: #fef3c7; color: #92400e; border: 1px solid #fbbf24; }
        .status-interesado { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .status-no-interesado { background-color: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
        .note-bubble { position: relative; }
        .note-bubble::before { content: ''; position: absolute; left: -17px; top: 12px; width: 10px; height: 10px; border-radius: 50%; background: #3b82f6; border: 2px solid white; }
        /* Alerta de 5 minutos */
        .alert-row { background-color: #fff1f2; border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden font-sans">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 max-w-[90%] text-center">
            <h1 class="text-3xl font-black text-blue-600 mb-1">INMO<span class="text-slate-900">CRM</span></h1>
            <p class="text-xs text-slate-500 mb-6 uppercase tracking-widest">Acceso Agentes</p>
            
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Usuario (agente)" class="w-full bg-slate-50 p-3 rounded-lg border outline-none focus:border-blue-500">
                <input id="login-pass" type="password" placeholder="Contraseña (1234)" class="w-full bg-slate-50 p-3 rounded-lg border outline-none focus:border-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg hover:bg-blue-700 transition shadow-lg">INGRESAR</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-3 hidden font-bold">Credenciales incorrectas.</p>
        </div>
    </div>

    <div id="app-container" class="hidden h-full flex">
        <aside class="w-20 lg:w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20">
            <div class="p-6 border-b border-slate-800">
                <h1 class="hidden lg:block text-xl font-black tracking-tighter text-blue-400">AGENTE <span class="text-white">PRO</span></h1>
                <div class="lg:hidden text-center text-xl"><i class="fas fa-building text-blue-400"></i></div>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchTab('leads')" id="tab-btn-leads" class="w-full flex items-center justify-center lg:justify-start p-3 rounded-lg hover:bg-slate-800 transition text-blue-400 bg-slate-800">
                    <i class="fas fa-bolt lg:mr-3"></i> <span class="hidden lg:block font-semibold">Leads</span>
                </button>
                <button onclick="switchTab('cartera')" id="tab-btn-cartera" class="w-full flex items-center justify-center lg:justify-start p-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fas fa-users lg:mr-3"></i> <span class="hidden lg:block font-semibold">Mi Cartera</span>
                </button>
                <button onclick="switchTab('catalogo')" id="tab-btn-catalogo" class="w-full flex items-center justify-center lg:justify-start p-3 rounded-lg hover:bg-slate-800 transition text-yellow-400">
                    <i class="fas fa-book-open lg:mr-3"></i> <span class="hidden lg:block font-semibold text-white">Catálogo</span>
                </button>
            </nav>
            <div class="p-6 bg-slate-950 border-t border-slate-800 text-center space-y-3">
                <button onclick="simularLead()" class="bg-blue-600 hover:bg-blue-700 p-2 rounded-lg text-xs font-bold w-full transition">
                    <i class="fas fa-magic"></i> <span class="hidden lg:inline ml-1">Simular Lead</span>
                </button>
                <button onclick="logout()" class="text-red-400 hover:text-red-300 text-xs w-full transition">
                    <i class="fas fa-sign-out-alt"></i> <span class="hidden lg:inline ml-1">Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden relative">
            <header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm z-10">
                <h2 id="view-title" class="text-lg font-bold text-slate-700 uppercase tracking-wide">Bandeja de Leads</h2>
                <div class="flex items-center">
                    <span class="text-sm font-semibold text-slate-600 bg-slate-100 px-4 py-2 rounded-lg border shadow-sm" id="header-date">
                        Cargando fecha...
                    </span>
                </div>
            </header>

            <div class="p-6 overflow-y-auto flex-1 pb-20">
                
                <section id="view-leads" class="space-y-4">
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 border-b text-slate-400 uppercase text-[10px] font-bold">
                                <tr>
                                    <th class="p-4 w-1/4">Cliente / Ingreso</th>
                                    <th class="p-4 w-1/4">Inmueble Solicitado</th>
                                    <th class="p-4 w-1/4">SLA (Alerta > 5m)</th>
                                    <th class="p-4 text-right">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="leads-list"></tbody>
                        </table>
                    </div>
                </section>

                <section id="view-cartera" class="hidden space-y-6">
                    <div id="contacts-container" class="grid grid-cols-1 gap-6"></div>
                </section>

                <section id="view-catalogo" class="hidden">
                    <div class="mb-6">
                        <h3 class="text-xl font-bold text-slate-800">Catálogo de Inmuebles Activos</h3>
                        <p class="text-sm text-slate-500">Toda la información necesaria para asesorar a tus clientes.</p>
                    </div>
                    <div id="catalogo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </section>

            </div>
        </main>
    </div>

    <script>
        // --- AUTENTICACIÓN SIMPLE ---
        function login() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            if (u === 'agente' && p === '1234') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                render(); // Iniciar renderizado
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
            document.getElementById('login-error').classList.add('hidden');
        }

        // --- RELOJ FECHA/HORA (Sin segundos) ---
        function actualizarReloj() {
            const now = new Date();
            // Formato: Jueves, 9 de Abril de 2026, 09:36
            const opciones = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            let fechaTexto = now.toLocaleDateString('es-AR', opciones);
            // Capitalizar la primera letra
            fechaTexto = fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1);
            document.getElementById('header-date').innerText = fechaTexto;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // --- BASE DE DATOS Y ESTADO ---
        let leads = JSON.parse(localStorage.getItem('v4_leads')) || [];
        let contactos = JSON.parse(localStorage.getItem('v4_contacts')) || [];
        
        // Catálogo enriquecido
        const propiedades = [
            { id: 'p1', nombre: 'Edificio KAIZEN (Nva Cba)', precio: 'USD 85.000', detalles: '1 y 2 Dormitorios. Posesión Inmediata. Amenities: Piscina, SUM.', script: 'Hola! Soy asesor inmobiliario. Vi tu interés en el Edificio KAIZEN en Nueva Córdoba. ¿Te gustaría coordinar una visita?' },
            { id: 'p2', nombre: 'Lotes Manantiales II', precio: 'Desde USD 45.000', detalles: 'Lotes de 250m2 a 360m2. Seguridad 24hs. Financiación propia.', script: 'Hola! Un gusto saludarte. Te contacto por los lotes disponibles en Manantiales II con financiación. ¿Buscabas para invertir o construir?' },
            { id: 'p3', nombre: 'Casa Valle Escondido', precio: 'USD 220.000', detalles: '3 Dormitorios, 2 baños, quincho y pileta. Barrio cerrado.', script: 'Hola! Te escribo por la casa en Valle Escondido. Tiene un lote excelente de 600m2. ¿Querés que te envíe el video recorrido?' }
        ];

        function sync() {
            localStorage.setItem('v4_leads', JSON.stringify(leads));
            localStorage.setItem('v4_contacts', JSON.stringify(contactos));
            render();
        }

        // --- NAVEGACIÓN ---
        function switchTab(tab) {
            document.getElementById('view-leads').classList.toggle('hidden', tab !== 'leads');
            document.getElementById('view-cartera').classList.toggle('hidden', tab !== 'cartera');
            document.getElementById('view-catalogo').classList.toggle('hidden', tab !== 'catalogo');
            
            // Reset colors
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('bg-slate-800', 'text-blue-400');
                b.classList.add('text-white');
            });
            
            // Set Active
            const activeBtn = document.getElementById(`tab-btn-${tab}`);
            activeBtn.classList.add('bg-slate-800', 'text-blue-400');
            activeBtn.classList.remove('text-white');

            const titles = { leads: 'Bandeja de Leads', cartera: 'Mi Cartera de Seguimiento', catalogo: 'Catálogo de Inmuebles' };
            document.getElementById('view-title').innerText = titles[tab];
        }

        // --- FUNCIONES CORE ---
        function simularLead() {
            const propsAleatorias = ['p1', 'p2', 'p3'];
            const l = {
                id: Date.now(),
                nombre: "Prospecto Web #" + Math.floor(Math.random()*100),
                telefono: "549351" + Math.floor(Math.random()*9000000),
                propId: propsAleatorias[Math.floor(Math.random()*propsAleatorias.length)],
                fechaIngreso: new Date().toISOString(),
                estado: 'No Contactado'
            };
            leads.push(l);
            sync();
            if(document.getElementById('view-leads').classList.contains('hidden')) switchTab('leads');
        }

        function contactarYA(id) {
            const idx = leads.findIndex(l => l.id === id);
            const lead = leads[idx];
            const prop = propiedades.find(p => p.id === lead.propId);

            const c = {
                ...lead,
                estado: 'Contactado',
                fechaContacto: new Date().toISOString(),
                notas: [{ text: "Lead contactado por primera vez vía WhatsApp.", time: new Date().toLocaleString() }],
                historial: [`Primer contacto realizado el ${new Date().toLocaleString()}`]
            };

            window.open(`https://wa.me/${lead.telefono}?text=${encodeURIComponent(prop.script)}`, '_blank');
            
            contactos.push(c);
            leads.splice(idx, 1);
            sync();
            switchTab('cartera');
        }

        function addNota(contactId) {
            const input = document.getElementById(`input-note-${contactId}`);
            if(!input.value.trim()) return;
            const c = contactos.find(c => c.id === contactId);
            c.notas.unshift({ text: input.value, time: new Date().toLocaleString() });
            input.value = '';
            sync();
        }

        function cambiarEstado(id, nuevo) {
            if(confirm(`¿Pasar este cliente a estado: "${nuevo}"?`)) {
                const c = contactos.find(c => c.id === id);
                c.estado = nuevo;
                c.notas.unshift({ text: `Estado cambiado a: ${nuevo}`, time: new Date().toLocaleString() });
                sync();
            } else { render(); }
        }

        function cambiarInmueble(id, nuevoPropId) {
            const c = contactos.find(c => c.id === id);
            const propAntigua = propiedades.find(p => p.id === c.propId);
            const propNueva = propiedades.find(p => p.id === nuevoPropId);
            
            if(confirm(`¿El cliente cambió su interés a ${propNueva.nombre}?`)) {
                c.propId = nuevoPropId;
                c.notas.unshift({ 
                    text: `Interés modificado: Pasó de "${propAntigua.nombre}" a "${propNueva.nombre}"`, 
                    time: new Date().toLocaleString() 
                });
                sync();
            } else { render(); }
        }

        // --- RENDERIZADO VISUAL ---
        function render() {
            // 1. Render Leads
            const list = document.getElementById('leads-list');
            list.innerHTML = '';
            leads.forEach(l => {
                const prop = propiedades.find(p => p.id === l.propId);
                const fechaFormat = new Date(l.fechaIngreso).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const minutos = Math.floor((new Date() - new Date(l.fechaIngreso))/60000);
                
                // Lógica SLA 5 minutos
                const isAlert = minutos >= 5;
                const rowClass = isAlert ? 'alert-row' : 'hover:bg-slate-50 border-b border-slate-100';
                const timeHtml = isAlert 
                    ? `<span class="text-red-600 font-black animate-pulse"><i class="fas fa-exclamation-triangle mr-1"></i> ${minutos} min en espera</span>`
                    : `<span class="text-slate-500 font-semibold">${minutos} min</span>`;

                list.innerHTML += `
                    <tr class="${rowClass} transition-colors">
                        <td class="p-4">
                            <div class="font-bold text-slate-800 text-base">${l.nombre}</div>
                            <div class="text-[10px] text-slate-500 mt-1"><i class="far fa-calendar-alt"></i> Ingresó hoy a las ${fechaFormat}</div>
                        </td>
                        <td class="p-4"><span class="bg-blue-50 border border-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm">${prop.nombre}</span></td>
                        <td class="p-4 text-sm">${timeHtml}</td>
                        <td class="p-4 text-right">
                            <button onclick="contactarYA(${l.id})" class="bg-[#25D366] hover:bg-[#1DA851] text-white px-5 py-2.5 rounded-lg text-xs font-bold shadow-md transition transform hover:scale-105">
                                <i class="fab fa-whatsapp mr-1 text-sm"></i> ATENDER
                            </button>
                        </td>
                    </tr>
                `;
            });

            // 2. Render Cartera
            const contContainer = document.getElementById('contacts-container');
            contContainer.innerHTML = '';
            contactos.slice().reverse().forEach(c => {
                // Generar options para el select de cambio de inmueble
                const optionsProp = propiedades.map(p => 
                    `<option value="${p.id}" ${c.propId === p.id ? 'selected' : ''}>${p.nombre}</option>`
                ).join('');

                contContainer.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col lg:flex-row">
                        <div class="w-full lg:w-1/3 p-6 bg-slate-50 border-r border-slate-200">
                            <div class="flex items-center gap-4 mb-6 pb-6 border-b border-slate-200">
                                <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-2xl shadow-sm">${c.nombre[0]}</div>
                                <div>
                                    <h3 class="font-black text-slate-800 text-lg leading-tight">${c.nombre}</h3>
                                    <a href="https://wa.me/${c.telefono}" target="_blank" class="text-xs text-blue-600 font-bold hover:underline mt-1 block"><i class="fab fa-whatsapp"></i> ${c.telefono}</a>
                                </div>
                            </div>
                            
                            <div class="space-y-5">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Estado del Embudo</label>
                                    <select onchange="cambiarEstado(${c.id}, this.value)" class="w-full p-2.5 rounded-lg border font-bold text-sm status-${c.estado.toLowerCase().replace(' ','-')} outline-none shadow-sm cursor-pointer">
                                        <option ${c.estado === 'Contactado' ? 'selected':''}>Contactado</option>
                                        <option ${c.estado === 'Interesado' ? 'selected':''}>Interesado</option>
                                        <option ${c.estado === 'No Interesado' ? 'selected':''}>No Interesado</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Inmueble de Interés</label>
                                    <select onchange="cambiarInmueble(${c.id}, this.value)" class="w-full p-2.5 rounded-lg border font-bold text-sm text-slate-700 bg-white outline-none focus:ring-2 ring-blue-500 shadow-sm cursor-pointer">
                                        ${optionsProp}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="flex-1 p-6 flex flex-col bg-white">
                            <div class="flex items-center justify-between mb-4">
                                <h4 class="font-bold text-slate-800 text-sm"><i class="far fa-comments mr-2 text-blue-500"></i>Bitácora de Seguimiento</h4>
                            </div>

                            <div class="flex gap-2 mb-6">
                                <input id="input-note-${c.id}" type="text" placeholder="Anota aquí acuerdos, rechazos o próxima fecha de llamado..." class="flex-1 bg-slate-100 border border-slate-200 p-3 rounded-lg text-sm focus:bg-white focus:ring-2 ring-blue-500 outline-none transition">
                                <button onclick="addNota(${c.id})" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold text-xs hover:bg-blue-700 shadow-md transition">
                                    GUARDAR
                                </button>
                            </div>

                            <div class="flex-1 space-y-5 max-h-[300px] overflow-y-auto pr-3 ml-4 border-l-2 border-slate-100 pt-2">
                                ${c.notas.map((n, index) => `
                                    <div class="note-bubble ml-5 ${index === 0 ? 'opacity-100' : 'opacity-80'}">
                                        <p class="text-[10px] text-slate-400 font-bold mb-0.5">${n.time}</p>
                                        <p class="text-sm text-slate-700 bg-slate-50 p-3 rounded-lg border border-slate-100 inline-block w-full shadow-sm">${n.text}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });

            // 3. Render Catálogo de Propiedades
            const catGrid = document.getElementById('catalogo-grid');
            catGrid.innerHTML = '';
            propiedades.forEach(p => {
                catGrid.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition group">
                        <div class="flex justify-between items-start mb-3">
                            <h4 class="font-black text-slate-800 text-lg leading-tight group-hover:text-blue-600 transition">${p.nombre}</h4>
                        </div>
                        <p class="text-xl font-bold text-green-600 mb-4">${p.precio}</p>
                        <p class="text-sm text-slate-600 mb-6 bg-slate-50 p-3 rounded-lg border border-slate-100">${p.detalles}</p>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Script de Venta Predeterminado</p>
                            <div class="text-xs text-slate-500 italic border-l-4 border-blue-200 pl-3">"${p.script}"</div>
                        </div>
                    </div>
                `;
            });
        }

        // Refrescar vistas cada minuto para actualizar los tiempos de espera SLA automáticamente
        setInterval(() => {
            if(!document.getElementById('view-leads').classList.contains('hidden')) {
                render();
            }
        }, 60000);
    </script>
</body>
</html>
