<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Agente - CRM Inmobiliario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .status-no-contactado { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .status-contactado { background-color: #fef3c7; color: #92400e; border: 1px solid #fbbf24; }
        .status-interesado { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .status-no-interesado { background-color: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        .note-bubble { position: relative; }
        .note-bubble::before { content: ''; position: absolute; left: -17px; top: 12px; width: 10px; height: 10px; border-radius: 50%; background: #3b82f6; border: 2px solid white; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex overflow-hidden">

    <aside class="w-20 lg:w-64 bg-slate-900 text-white flex flex-col transition-all">
        <div class="p-6 border-b border-slate-800">
            <h1 class="hidden lg:block text-xl font-black tracking-tighter text-blue-400">AGENTE <span class="text-white">PRO</span></h1>
            <div class="lg:hidden text-center text-xl"><i class="fas fa-building text-blue-400"></i></div>
        </div>
        <nav class="flex-1 p-4 space-y-4">
            <button onclick="switchTab('leads')" id="tab-btn-leads" class="w-full flex items-center justify-center lg:justify-start p-3 rounded-lg hover:bg-slate-800 transition text-blue-400">
                <i class="fas fa-bolt lg:mr-3"></i> <span class="hidden lg:block font-semibold">Leads Entrantes</span>
            </button>
            <button onclick="switchTab('cartera')" id="tab-btn-cartera" class="w-full flex items-center justify-center lg:justify-start p-3 rounded-lg hover:bg-slate-800 transition">
                <i class="fas fa-users lg:mr-3"></i> <span class="hidden lg:block font-semibold">Mi Cartera</span>
            </button>
        </nav>
        <div class="p-6 bg-slate-950 border-t border-slate-800 text-center">
            <button onclick="simularLead()" class="bg-blue-600 hover:bg-blue-700 p-2 rounded-lg text-xs font-bold w-full transition">
                <i class="fas fa-magic"></i> <span class="hidden lg:inline ml-1">Simular Lead</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm z-10">
            <h2 id="view-title" class="text-lg font-bold text-slate-700 uppercase tracking-wide">Bandeja de Leads</h2>
            <div class="flex items-center space-x-4">
                <span class="text-xs font-semibold bg-gray-200 px-3 py-1 rounded-full text-gray-600" id="clock">00:00:00</span>
            </div>
        </header>

        <div class="p-6 overflow-y-auto flex-1">
            
            <section id="view-leads" class="space-y-4">
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 border-b text-slate-400 uppercase text-[10px] font-bold">
                            <tr>
                                <th class="p-4">Cliente / Origen</th>
                                <th class="p-4">Propiedad Consultada</th>
                                <th class="p-4">Tiempo de Espera</th>
                                <th class="p-4 text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="leads-list"></tbody>
                    </table>
                </div>
            </section>

            <section id="view-cartera" class="hidden space-y-6">
                <div id="contacts-container" class="grid grid-cols-1 gap-6">
                    </div>
            </section>

        </div>
    </main>

    <script>
        // --- BASE DE DATOS LOCAL ---
        let leads = JSON.parse(localStorage.getItem('agent_leads')) || [];
        let contactos = JSON.parse(localStorage.getItem('agent_contacts')) || [];
        const propiedades = [
            { id: 'p1', nombre: 'Edificio KAIZEN - Córdoba', script: 'Hola! Soy el asesor de Viggo. Vi tu interés en el Edificio KAIZEN.' },
            { id: 'p2', nombre: 'Lotes en Manantiales II', script: 'Hola! Un gusto saludarte. Te contacto por los lotes disponibles en Manantiales.' }
        ];

        function sync() {
            localStorage.setItem('agent_leads', JSON.stringify(leads));
            localStorage.setItem('agent_contacts', JSON.stringify(contactos));
            render();
        }

        // --- NAVEGACIÓN ---
        function switchTab(tab) {
            document.getElementById('view-leads').classList.toggle('hidden', tab !== 'leads');
            document.getElementById('view-cartera').classList.toggle('hidden', tab !== 'cartera');
            document.getElementById('tab-btn-leads').classList.toggle('text-blue-400', tab === 'leads');
            document.getElementById('tab-btn-cartera').classList.toggle('text-blue-400', tab === 'cartera');
            document.getElementById('view-title').innerText = tab === 'leads' ? 'Bandeja de Leads' : 'Mi Cartera de Seguimiento';
        }

        // --- OPERATIVA LEADS ---
        function simularLead() {
            const l = {
                id: Date.now(),
                nombre: "Cliente Nuevo #" + Math.floor(Math.random()*100),
                telefono: "549351" + Math.floor(Math.random()*9000000),
                propId: 'p1',
                fechaIngreso: new Date().toISOString(),
                estado: 'No Contactado'
            };
            leads.push(l);
            sync();
        }

        function contactarYA(id) {
            const idx = leads.findIndex(l => l.id === id);
            const lead = leads[idx];
            const prop = propiedades.find(p => p.id === lead.propId);

            // Crear el contacto en cartera
            const c = {
                ...lead,
                estado: 'Contactado',
                fechaContacto: new Date().toISOString(),
                notas: [{ text: "Lead contactado por primera vez vía WhatsApp.", time: new Date().toLocaleString() }],
                historial: [`Primer contacto realizado el ${new Date().toLocaleString()}`]
            };

            window.open(`https://wa.me/${lead.telefono}?text=${encodeURIComponent(prop.script)}`, '_blank');
            
            contactos.push(c);
            leads.splice(idx, 1);
            sync();
            switchTab('cartera');
        }

        // --- CRM: GESTIÓN DE NOTAS Y ESTADOS ---
        function addNota(contactId) {
            const input = document.getElementById(`input-note-${contactId}`);
            if(!input.value.trim()) return;

            const c = contactos.find(c => c.id === contactId);
            c.notas.unshift({
                text: input.value,
                time: new Date().toLocaleString()
            });
            input.value = '';
            sync();
        }

        function cambiarEstadoConConfirmacion(id, nuevo) {
            if(confirm(`¿Estás seguro de pasar este cliente a "${nuevo}"?`)) {
                const c = contactos.find(c => c.id === id);
                const log = `Estado cambiado: ${c.estado} -> ${nuevo}`;
                c.estado = nuevo;
                c.historial.push(`${log} el ${new Date().toLocaleString()}`);
                c.notas.unshift({ text: log, time: new Date().toLocaleString() });
                sync();
            } else {
                render(); // Revertir visualmente el select
            }
        }

        // --- RENDERIZADO ---
        function render() {
            // Render Leads
            const list = document.getElementById('leads-list');
            list.innerHTML = '';
            leads.forEach(l => {
                const minutos = Math.floor((new Date() - new Date(l.fechaIngreso))/60000);
                list.innerHTML += `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-4 font-bold text-slate-800">${l.nombre}</td>
                        <td class="p-4"><span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-xs font-bold">KAIZEN Córdoba</span></td>
                        <td class="p-4 text-xs ${minutos > 15 ? 'text-red-500 font-bold animate-pulse' : 'text-slate-500'}">Hace ${minutos} min</td>
                        <td class="p-4 text-right">
                            <button onclick="contactarYA(${l.id})" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md transition">
                                <i class="fab fa-whatsapp mr-1 text-sm"></i> CONTACTAR
                            </button>
                        </td>
                    </tr>
                `;
            });

            // Render Cartera (CRM Agente)
            const contContainer = document.getElementById('contacts-container');
            contContainer.innerHTML = '';
            contactos.slice().reverse().forEach(c => {
                contContainer.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col lg:flex-row">
                        <div class="w-full lg:w-1/3 p-6 bg-slate-50 border-r border-slate-200">
                            <div class="flex items-center gap-4 mb-6">
                                <div class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-xl">${c.nombre[0]}</div>
                                <div>
                                    <h3 class="font-black text-slate-800 leading-none">${c.nombre}</h3>
                                    <p class="text-xs text-slate-400 mt-1">${c.telefono}</p>
                                </div>
                            </div>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Estado Actual</label>
                                    <select onchange="cambiarEstadoConConfirmacion(${c.id}, this.value)" class="w-full mt-1 p-2 rounded-lg border font-bold text-sm status-${c.estado.toLowerCase().replace(' ','-')} outline-none">
                                        <option ${c.estado === 'Contactado' ? 'selected':''}>Contactado</option>
                                        <option ${c.estado === 'Interesado' ? 'selected':''}>Interesado</option>
                                        <option ${c.estado === 'No Interesado' ? 'selected':''}>No Interesado</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Inmueble</label>
                                    <div class="text-xs font-bold text-slate-700 bg-white p-2 rounded-lg border">Edificio KAIZEN</div>
                                </div>
                            </div>
                        </div>

                        <div class="flex-1 p-6 flex flex-col bg-white">
                            <div class="flex items-center justify-between mb-4">
                                <h4 class="font-bold text-slate-800 text-sm"><i class="far fa-comments mr-2 text-blue-500"></i>Bitácora de Seguimiento</h4>
                                <span class="text-[10px] font-bold text-slate-400 uppercase">Historial de notas</span>
                            </div>

                            <div class="flex gap-2 mb-6">
                                <input id="input-note-${c.id}" type="text" placeholder="¿Qué hablaste con el cliente?" class="flex-1 bg-slate-100 border-none p-3 rounded-lg text-sm focus:ring-2 ring-blue-500 outline-none">
                                <button onclick="addNota(${c.id})" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-xs hover:bg-blue-700 transition">
                                    <i class="fas fa-save mr-1"></i> GUARDAR
                                </button>
                            </div>

                            <div class="flex-1 space-y-4 max-h-48 overflow-y-auto pr-2 ml-4 border-l-2 border-slate-100">
                                ${c.notas.map(n => `
                                    <div class="note-bubble ml-4">
                                        <p class="text-[10px] text-slate-400 font-semibold">${n.time}</p>
                                        <p class="text-sm text-slate-700 leading-tight">${n.text}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Reloj e inicialización
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        render();
    </script>
</body>
</html>
