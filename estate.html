<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InmoCRM Pro - Control Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .status-no-contactado { background-color: #fee2e2; color: #991b1b; }
        .status-contactado { background-color: #fef3c7; color: #92400e; }
        .status-interesado { background-color: #d1fae5; color: #065f46; }
        .status-no-interesado { background-color: #e5e7eb; color: #374151; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-bold tracking-tighter text-blue-400">INMOCRM <span class="text-xs text-white bg-blue-600 px-1 rounded">PRO</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showSection('leads')" class="w-full text-left p-3 rounded hover:bg-slate-800 flex items-center"><i class="fas fa-user-tie mr-3"></i> Gestión de Leads</button>
            <button onclick="showSection('propiedades')" class="w-full text-left p-3 rounded hover:bg-slate-800 flex items-center"><i class="fas fa-home mr-3"></i> Propiedades</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm">
            <h2 id="section-title" class="text-lg font-semibold">Panel de Control</h2>
            <div class="flex space-x-3">
                <button onclick="limpiarDatos()" class="text-xs text-red-500 hover:underline">Resetear Sistema</button>
                <div id="reloj" class="text-sm font-mono bg-gray-100 px-3 py-1 rounded"></div>
            </div>
        </header>

        <div class="p-8 overflow-y-auto flex-1">
            
            <section id="sec-leads">
                <div class="flex justify-between items-end mb-6">
                    <div class="grid grid-cols-4 gap-4 flex-1 mr-4">
                        <div class="bg-white p-4 rounded shadow-sm border-t-4 border-blue-500">
                            <p class="text-xs text-gray-500">Total Leads</p>
                            <p id="kpi-total" class="text-2xl font-bold">0</p>
                        </div>
                        <div class="bg-white p-4 rounded shadow-sm border-t-4 border-red-500">
                            <p class="text-xs text-gray-500">Pendientes</p>
                            <p id="kpi-pendientes" class="text-2xl font-bold">0</p>
                        </div>
                    </div>
                    <button onclick="nuevoLeadManual()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">Simular Entrada Web</button>
                </div>

                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-50 border-b text-gray-500 uppercase text-xs">
                            <tr>
                                <th class="p-4">Cliente / Ingreso</th>
                                <th class="p-4">Propiedad</th>
                                <th class="p-4">Estado / Auditoría</th>
                                <th class="p-4">Tiempos</th>
                                <th class="p-4 text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="leads-list"></tbody>
                    </table>
                </div>
            </section>

            <section id="sec-propiedades" class="hidden">
                <div class="bg-white p-6 rounded-xl shadow-sm border mb-8">
                    <h3 class="font-bold mb-4">Registrar Nueva Propiedad</h3>
                    <div class="grid grid-cols-3 gap-4">
                        <input id="prop-nombre" type="text" placeholder="Nombre (Ej: Edificio Faro)" class="border p-2 rounded">
                        <input id="prop-direccion" type="text" placeholder="Dirección" class="border p-2 rounded">
                        <input id="prop-precio" type="text" placeholder="Precio (USD)" class="border p-2 rounded">
                        <input id="prop-link" type="text" placeholder="URL Ficha Técnica" class="border p-2 rounded col-span-2">
                        <button onclick="guardarPropiedad()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Guardar Propiedad</button>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-6" id="prop-grid"></div>
            </section>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN INICIAL Y PERSISTENCIA
        let leads = JSON.parse(localStorage.getItem('inmo_leads')) || [];
        let propiedades = JSON.parse(localStorage.getItem('inmo_props')) || [
            { id: 'p1', nombre: 'Depto Nueva Córdoba', direccion: 'Estrada 123', precio: '85.000', link: '#' }
        ];

        function save() {
            localStorage.setItem('inmo_leads', JSON.stringify(leads));
            localStorage.setItem('inmo_props', JSON.stringify(propiedades));
            render();
        }

        // GESTIÓN DE SECCIONES
        function showSection(sec) {
            document.getElementById('sec-leads').classList.add('hidden');
            document.getElementById('sec-propiedades').classList.add('hidden');
            document.getElementById('sec-' + sec).classList.remove('hidden');
            document.getElementById('section-title').innerText = sec === 'leads' ? 'Gestión Comercial de Leads' : 'Catálogo de Propiedades';
        }

        // LÓGICA DE PROPIEDADES
        function guardarPropiedad() {
            const prop = {
                id: 'prop_' + Date.now(),
                nombre: document.getElementById('prop-nombre').value,
                direccion: document.getElementById('prop-direccion').value,
                precio: document.getElementById('prop-precio').value,
                link: document.getElementById('prop-link').value
            };
            if(!prop.nombre) return alert("Mínimo nombre");
            propiedades.push(prop);
            save();
            // Limpiar campos
            ['prop-nombre', 'prop-direccion', 'prop-precio', 'prop-link'].forEach(id => document.getElementById(id).value = '');
        }

        function eliminarProp(id) {
            propiedades = propiedades.filter(p => p.id !== id);
            save();
        }

        // LÓGICA DE LEADS
        function nuevoLeadManual() {
            const lead = {
                id: Date.now(),
                nombre: "Lead " + (leads.length + 1),
                telefono: "549351" + Math.floor(Math.random() * 9000000),
                propId: propiedades[0]?.id || '',
                estado: 'No Contactado',
                fechaIngreso: new Date().toISOString(),
                fechaContacto: null,
                historial: [`Lead creado automáticamente desde Web a las ${new Date().toLocaleTimeString()}`]
            };
            leads.push(lead);
            save();
        }

        function cambiarEstadoLead(id, nuevoEstado) {
            const lead = leads.find(l => l.id === id);
            if(lead) {
                const log = `Estado cambiado de ${lead.estado} a ${nuevoEstado} el ${new Date().toLocaleString()}`;
                lead.estado = nuevoEstado;
                lead.historial.push(log);
                save();
            }
        }

        function cambiarPropiedadLead(id, pId) {
            const lead = leads.find(l => l.id === id);
            if(lead) {
                lead.propId = pId;
                save();
            }
        }

        function contactarWA(id) {
            const lead = leads.find(l => l.id === id);
            const prop = propiedades.find(p => p.id === lead.propId) || { nombre: 'Consulta', link: '' };
            
            if(!lead.fechaContacto) {
                lead.fechaContacto = new Date().toISOString();
                lead.historial.push(`Primer contacto realizado via WhatsApp a las ${new Date().toLocaleTimeString()}`);
                lead.estado = 'Contactado';
            }

            const msj = `Hola ${lead.nombre}, un gusto saludarte. Te escribo por tu consulta sobre *${prop.nombre}*.\n\nUbicación: ${prop.direccion || 'Consultar'}\nLink: ${prop.link}\n\n¿Te gustaría coordinar una visita?`;
            window.open(`https://wa.me/${lead.telefono}?text=${encodeURIComponent(msj)}`, '_blank');
            save();
        }

        // RENDERIZADO
        function render() {
            // Render Leads
            const list = document.getElementById('leads-list');
            list.innerHTML = '';
            leads.sort((a,b) => new Date(b.fechaIngreso) - new Date(a.fechaIngreso)).forEach(l => {
                const prop = propiedades.find(p => p.id === l.propId);
                const timeDiff = l.fechaContacto ? 
                    Math.floor((new Date(l.fechaContacto) - new Date(l.fechaIngreso))/60000) + ' min' : 
                    'Pendiente';

                list.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-4">
                            <div class="font-bold">${l.nombre}</div>
                            <div class="text-[10px] text-gray-400">${new Date(l.fechaIngreso).toLocaleString()}</div>
                        </td>
                        <td class="p-4">
                            <select onchange="cambiarPropiedadLead(${l.id}, this.value)" class="text-xs border p-1 rounded w-full">
                                ${propiedades.map(p => `<option value="${p.id}" ${l.propId === p.id ? 'selected':''}>${p.nombre}</option>`).join('')}
                            </select>
                        </td>
                        <td class="p-4">
                            <select onchange="cambiarEstadoLead(${l.id}, this.value)" class="text-xs p-1 rounded border font-semibold status-${l.estado.toLowerCase().replace(' ','-')}">
                                <option ${l.estado === 'No Contactado' ? 'selected':''}>No Contactado</option>
                                <option ${l.estado === 'Contactado' ? 'selected':''}>Contactado</option>
                                <option ${l.estado === 'Interesado' ? 'selected':''}>Interesado</option>
                                <option ${l.estado === 'No Interesado' ? 'selected':''}>No Interesado</option>
                            </select>
                            <div class="mt-1">
                                <details class="text-[9px] text-gray-400 cursor-pointer">
                                    <summary>Ver Auditoría (${l.historial.length})</summary>
                                    <ul class="bg-gray-100 p-1 rounded">
                                        ${l.historial.map(h => `<li>• ${h}</li>`).join('')}
                                    </ul>
                                </details>
                            </div>
                        </td>
                        <td class="p-4">
                            <span class="text-xs font-mono ${l.fechaContacto ? 'text-green-600':'text-red-600 animate-pulse'}">
                                <i class="far fa-clock"></i> Resp: ${timeDiff}
                            </span>
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="contactarWA(${l.id})" class="bg-green-500 text-white p-2 rounded-full hover:bg-green-600 shadow">
                                <i class="fab fa-whatsapp px-1"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            // Render Propiedades
            const grid = document.getElementById('prop-grid');
            grid.innerHTML = '';
            propiedades.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border group">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-lg">${p.nombre}</h4>
                            <button onclick="eliminarProp('${p.id}')" class="text-red-300 hover:text-red-600 opacity-0 group-hover:opacity-100 transition"><i class="fas fa-trash"></i></button>
                        </div>
                        <p class="text-sm text-gray-500 italic">${p.direccion}</p>
                        <div class="mt-4 flex justify-between items-center border-t pt-2">
                            <span class="text-blue-600 font-bold">USD ${p.precio}</span>
                            <a href="${p.link}" target="_blank" class="text-xs text-gray-400 underline">Ficha pública</a>
                        </div>
                    </div>
                `;
            });

            // KPIs
            document.getElementById('kpi-total').innerText = leads.length;
            document.getElementById('kpi-pendientes').innerText = leads.filter(l => l.estado === 'No Contactado').length;
        }

        function limpiarDatos() {
            if(confirm("¿Borrar todo?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Reloj tiempo real para control de agentes
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }, 1000);

        render();
    </script>
</body>
</html>
