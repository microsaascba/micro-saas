<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LM Desarrollos | Solicita Información</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('/img/img10.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .input-premium:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 1px #a855f7;
        }
        
        .fade-in { animation: fadeIn 0.8s ease-in-out forwards; }
        .fade-out { animation: fadeOut 0.5s ease-in-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); display: none; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900/40 backdrop-blur-md border border-slate-700 p-8 rounded-2xl shadow-2xl relative overflow-hidden" id="main-container">
        
        <div id="form-state" class="transition-all duration-500">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-white mb-2 tracking-tight">LM<span class="text-purple-400">DESARROLLOS</span></h1>
                <p class="text-gray-300 text-sm">Déjanos tus datos y selecciona el emprendimiento que te interesa.</p>
            </div>

            <form id="leadForm" class="space-y-5">
                <div>
                    <label for="nombre" class="block text-sm font-bold text-gray-300 mb-1">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" required
                           class="input-premium w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-3 transition-colors placeholder-slate-500"
                           placeholder="Ej. Juan Pérez">
                </div>

                <div>
                    <label for="email" class="block text-sm font-bold text-gray-300 mb-1">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required
                           class="input-premium w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-3 transition-colors placeholder-slate-500"
                           placeholder="tu@email.com">
                </div>

                <div>
                    <label for="telefono" class="block text-sm font-bold text-gray-300 mb-1">Teléfono de Contacto</label>
                    <input type="tel" id="telefono" name="telefono" required
                           class="input-premium w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-3 transition-colors placeholder-slate-500"
                           placeholder="+54 9 351...">
                </div>

                <div class="pt-2">
                    <label class="block text-sm font-bold text-gray-300 mb-3">Emprendimiento de Interés</label>
                    <div class="space-y-3">
                        <label class="cursor-pointer block relative">
                            <input type="radio" name="emprendimiento" value="Edificio KAIZEN" class="peer sr-only" required>
                            <div class="w-full bg-slate-800/50 border border-slate-600 text-slate-300 rounded-lg px-4 py-3 transition-all hover:bg-slate-700/50 peer-checked:bg-purple-900/50 peer-checked:border-purple-400 peer-checked:text-white font-medium text-sm">
                                Edificio KAIZEN (Nva Cba)
                            </div>
                        </label>

                        <label class="cursor-pointer block relative">
                            <input type="radio" name="emprendimiento" value="Lotes Manantiales II" class="peer sr-only">
                            <div class="w-full bg-slate-800/50 border border-slate-600 text-slate-300 rounded-lg px-4 py-3 transition-all hover:bg-slate-700/50 peer-checked:bg-purple-900/50 peer-checked:border-purple-400 peer-checked:text-white font-medium text-sm">
                                Lotes Manantiales II
                            </div>
                        </label>

                        <label class="cursor-pointer block relative">
                            <input type="radio" name="emprendimiento" value="Torres del Parque" class="peer sr-only">
                            <div class="w-full bg-slate-800/50 border border-slate-600 text-slate-300 rounded-lg px-4 py-3 transition-all hover:bg-slate-700/50 peer-checked:bg-purple-900/50 peer-checked:border-purple-400 peer-checked:text-white font-medium text-sm">
                                Torres del Parque (General Paz)
                            </div>
                        </label>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn"
                            class="w-full bg-purple-600 text-white font-bold rounded-lg px-4 py-3 hover:bg-purple-700 transition-colors focus:outline-none shadow-lg shadow-purple-900/50 flex justify-center items-center gap-2">
                        <i class="fas fa-paper-plane"></i> Solicitar Información
                    </button>
                </div>
            </form>
        </div>

        <div id="success-state" class="hidden absolute inset-0 bg-slate-900/95 backdrop-blur-xl flex flex-col items-center justify-center p-8 text-center z-10">
            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mb-6">
                <i class="fas fa-check text-4xl text-green-400"></i>
            </div>
            <h2 class="text-3xl font-black text-white mb-4">¡Muchas Gracias!</h2>
            <p class="text-gray-300 text-base leading-relaxed mb-8">
                Tus datos fueron recibidos correctamente.<br>
                El <strong>área de asesoría</strong> de LM Desarrollos se pondrá en contacto contigo a la brevedad.
            </p>
            <button onclick="reiniciarFormulario()" class="text-purple-400 hover:text-purple-300 font-bold text-sm underline transition-colors">
                Volver al inicio
            </button>
        </div>

    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            
            const emprendimientoRadios = document.getElementsByName('emprendimiento');
            let emprendimientoSeleccionado = '';
            for (let i = 0; i < emprendimientoRadios.length; i++) {
                if (emprendimientoRadios[i].checked) {
                    emprendimientoSeleccionado = emprendimientoRadios[i].value;
                    break;
                }
            }

            // 1. Crear el Lead
            const nuevoLead = {
                id: 'web_' + Date.now(), 
                nombre: nombre,
                email: email,
                telefono: telefono,
                emprendimiento: emprendimientoSeleccionado,
                fecha: new Date().toLocaleString()
            };

            // 2. Guardar en Bandeja Web Temporal (Asegurando que funcione entre pestañas)
            let leadsInbox = JSON.parse(localStorage.getItem('inmobiliaria_leads')) || [];
            leadsInbox.push(nuevoLead);
            localStorage.setItem('inmobiliaria_leads', JSON.stringify(leadsInbox));
            
            // Forzar un evento de storage para que otras pestañas (como el CRM Admin) se enteren al instante
            window.dispatchEvent(new Event('storage'));

            // 3. Transición visual (Cambiar formulario por Agradecimiento)
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="animate-spin mr-2"><i class="fas fa-circle-notch"></i></span> Procesando...';
            btn.disabled = true;

            setTimeout(() => {
                // Ocultar formulario
                document.getElementById('form-state').classList.add('fade-out');
                
                // Mostrar pantalla de éxito
                setTimeout(() => {
                    const successState = document.getElementById('success-state');
                    successState.classList.remove('hidden');
                    successState.classList.add('fade-in');
                }, 400); // Esperar a que el fade-out termine

            }, 1000); 
        });

        function reiniciarFormulario() {
            document.getElementById('leadForm').reset();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Solicitar Información';
            btn.disabled = false;
            
            document.getElementById('success-state').classList.add('hidden');
            document.getElementById('success-state').classList.remove('fade-in');
            
            document.getElementById('form-state').classList.remove('fade-out');
            document.getElementById('form-state').classList.add('fade-in');
        }
    </script>
</body>
</html>
