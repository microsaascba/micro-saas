<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comprobante de Venta</title>
  <style>
    /* Estilos base y tipografía */
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px; /* Reducido de 13px */
      margin: 0;
      padding: 20px;
      background: #e2e8f0; 
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Contenedor principal: Mitad de hoja A4 (Formato A5 Portrait) */
    .invoice-box {
      width: 148mm; 
      min-height: 210mm; 
      background: #fff;
      padding: 8mm; /* Reducido para dar más espacio interno */
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      box-sizing: border-box;
      position: relative;
    }

    /* Cabecera: Logo y Datos de la Empresa */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 2px solid #cbd5e1;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    .company-logo {
      max-width: 120px; /* Logo más chico */
      max-height: 55px;
      object-fit: contain;
    }
    .company-details {
      text-align: right;
    }
    .company-name {
      font-size: 16px; /* Reducido de 20px */
      font-weight: 900;
      color: #0f172a;
      margin: 0 0 3px 0;
      text-transform: uppercase;
    }
    .company-info {
      font-size: 10px; /* Reducido */
      color: #64748b;
      margin: 0;
      line-height: 1.3;
    }

    /* Título del documento */
    .doc-title {
      text-align: center;
      font-size: 14px; /* Reducido de 18px */
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 15px;
      text-transform: uppercase;
      background: #f8fafc;
      padding: 6px;
      border: 1px solid #e2e8f0;
    }

    /* Datos de la Venta y Cliente */
    .sale-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
      font-size: 11px; /* Reducido */
    }
    .info-block strong { color: #475569; display: inline-block; width: 60px; }

    /* Tabla de artículos */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
    }
    th {
      text-align: left;
      font-size: 10px; /* Reducido */
      text-transform: uppercase;
      background: #f1f5f9;
      color: #475569;
      padding: 6px;
      border-bottom: 2px solid #cbd5e1;
    }
    td {
      padding: 6px; /* Reducido de 10px */
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
      font-size: 11px;
    }

    /* Totales - MUCHO MÁS COMPACTO */
    .totals-box {
      width: 45%; /* Más angosto */
      float: right;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 8px; /* Reducido */
      background: #f8fafc;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 11px; /* Reducido de 13px */
    }
    .grand-total {
      font-size: 14px; /* Súper reducido de 18px */
      font-weight: 900;
      color: #0f172a;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 2px solid #cbd5e1;
    }

    /* Limpiar floats */
    .clearfix::after { content: ""; clear: both; display: table; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 25px; /* Reducido */
      font-size: 9px; /* Reducido */
      color: #64748b;
      border-top: 1px dashed #cbd5e1;
      padding-top: 10px;
    }

    /* Botones de control fuera de la impresión */
    .no-print {
      position: fixed;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }
    .btn {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: 0.2s;
      font-size: 12px;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-back { background: #334155; color: white; }
    .btn-print { background: #2563eb; color: white; }

    /* Reglas específicas para la impresora */
    @media print {
      @page { size: A5 portrait; margin: 0; }
      body { background: #fff; padding: 0; display: block; }
      .no-print { display: none; }
      .invoice-box { box-shadow: none; border: none; width: 100%; min-height: auto; padding: 8mm; }
    }
  </style>
</head>
<body>

  <div class="no-print">
    <button class="btn btn-back" onclick="window.close()">✕ Cerrar Pestaña</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
  </div>

  <div class="invoice-box">
    
    <div class="header">
      <div id="printLogoContainer">
        </div>
      <div class="company-details">
        <h1 class="company-name" id="printCompName">EMPRESA</h1>
        <p class="company-info" id="printCompInfo">
          Dirección<br>Teléfono
        </p>
      </div>
    </div>

    <div class="doc-title">Comprobante de Venta</div>

    <div class="sale-info">
      <div class="info-block">
        <div><strong>Cliente:</strong> <span id="printClient"></span></div>
        <div><strong>Atendió:</strong> <span id="printSeller"></span></div>
      </div>
      <div class="info-block">
        <div><strong>Ticket N°:</strong> <span id="printId"></span></div>
        <div><strong>Fecha:</strong> <span id="printDate"></span></div>
        <div><strong>Método:</strong> <span id="printMethod"></span> <span id="printCupon" style="font-size:9px; color:#666;"></span></div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 10%; text-align: center;">Cant</th>
          <th style="width: 50%;">Detalle del Producto</th>
          <th style="width: 20%; text-align: right;">Precio Un.</th>
          <th style="width: 20%; text-align: right;">Subtotal</th>
        </tr>
      </thead>
      <tbody id="printItems"></tbody>
    </table>

    <div class="clearfix">
      <div class="totals-box">
        <div class="total-row">
          <span>Subtotal:</span>
          <span id="printSubtotal">$0</span>
        </div>
        <div class="total-row" id="rowDiscount" style="display:none; color: #dc2626;">
          <span>Descuento:</span>
          <span id="printDiscount">-$0</span>
        </div>
        <div class="total-row grand-total">
          <span>TOTAL:</span>
          <span id="printTotal">$0</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <strong>Documento no válido como factura.</strong><br>
      Los trabajos a medida no tienen devolución. Conserve este comprobante.
    </div>

  </div>

  <script>
    function currency(n) { return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(n || 0); }

    const compName = localStorage.getItem('company_name') || 'Mi Empresa';
    const compAddress = localStorage.getItem('company_address') || '';
    const compPhone = localStorage.getItem('company_phone') || '';
    const compLogo = localStorage.getItem('company_logo') || '';

    document.getElementById('printCompName').textContent = compName;
    
    let infoHtml = '';
    if (compAddress) infoHtml += compAddress + '<br>';
    if (compPhone) infoHtml += 'Tel: ' + compPhone;
    document.getElementById('printCompInfo').innerHTML = infoHtml;

    if (compLogo && compLogo !== 'undefined') {
      document.getElementById('printLogoContainer').innerHTML = `<img src="${compLogo}" class="company-logo" alt="Logo">`;
    }

    const venta = JSON.parse(localStorage.getItem('last_sale_to_print'));

    if (!venta) {
      alert("No hay datos de venta para imprimir.");
      window.close();
    } else {
      document.getElementById('printId').textContent = venta.id.split('_')[1];
      document.getElementById('printDate').textContent = new Date(venta.createdAt).toLocaleString('es-AR');
      document.getElementById('printClient').textContent = venta.client || 'Consumidor Final';
      document.getElementById('printSeller').textContent = venta.seller || '-';
      document.getElementById('printMethod').textContent = venta.method;
      
      if (venta.cupon) {
        document.getElementById('printCupon').textContent = `(Lote: ${venta.cupon})`;
      }
      
      const itemsBody = document.getElementById('printItems');
      venta.items.forEach(i => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="text-align: center; font-weight: bold;">${i.qty}</td>
          <td>${i.name}</td>
          <td style="text-align: right; color: #475569;">${currency(i.price)}</td>
          <td style="text-align: right; font-weight: bold;">${currency(i.subtotal)}</td>
        `;
        itemsBody.appendChild(tr);
      });

      document.getElementById('printSubtotal').textContent = currency(venta.subtotal);
      
      if (venta.promoDiscount > 0) {
        document.getElementById('rowDiscount').style.display = 'flex';
        document.getElementById('printDiscount').textContent = "-" + currency(venta.promoDiscount);
      }
      
      document.getElementById('printTotal').textContent = currency(venta.total);

      window.onload = () => {
        setTimeout(() => {
          window.print();
        }, 500); 
      };
    }
  </script>
</body>
</html>
