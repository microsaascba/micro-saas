<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comprobante de Venta</title>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 10px; /* Reducción general de base */
      margin: 0;
      padding: 15px;
      background: #e2e8f0; 
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .invoice-box {
      width: 148mm; 
      min-height: 210mm; 
      background: #fff;
      padding: 6mm;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      box-sizing: border-box;
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center; /* Alineación central para mayor prolijidad */
      border-bottom: 1.5px solid #cbd5e1;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .company-logo {
      max-width: 100px;
      max-height: 45px;
      object-fit: contain;
    }
    .company-details {
      text-align: right;
    }
    .company-name {
      font-size: 14px; /* Más pequeño y elegante */
      font-weight: 900;
      color: #0f172a;
      margin: 0 0 2px 0;
      text-transform: uppercase;
    }
    .company-info {
      font-size: 9px;
      color: #64748b;
      margin: 0;
      line-height: 1.2;
    }

    .doc-title {
      text-align: center;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      text-transform: uppercase;
      background: #f8fafc;
      padding: 5px;
      border: 1px solid #e2e8f0;
    }

    .sale-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 10px;
    }
    .info-block strong { color: #475569; display: inline-block; width: 55px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
    }
    th {
      text-align: left;
      font-size: 9px;
      text-transform: uppercase;
      background: #f1f5f9;
      color: #475569;
      padding: 5px;
      border-bottom: 1.5px solid #cbd5e1;
    }
    td {
      padding: 5px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
      font-size: 10px;
    }

    /* TOTALES - REDUCCIÓN MÁXIMA */
    .totals-box {
      width: 40%;
      float: right;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 6px;
      background: #f8fafc;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
      font-size: 10px; /* Tamaño reducido */
    }
    .grand-total {
      font-size: 12px; /* Reducción de 14px a 12px */
      font-weight: 900;
      color: #0f172a;
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1.5px solid #cbd5e1;
    }

    .clearfix::after { content: ""; clear: both; display: table; }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 8.5px;
      color: #64748b;
      border-top: 1px dashed #cbd5e1;
      padding-top: 8px;
    }

    .no-print {
      position: fixed;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }
    .btn {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      font-size: 11px;
    }
    .btn-back { background: #334155; color: white; }
    .btn-print { background: #2563eb; color: white; }

    @media print {
      @page { size: A5 portrait; margin: 0; }
      body { background: #fff; padding: 0; display: block; }
      .no-print { display: none; }
      .invoice-box { box-shadow: none; border: none; width: 100%; min-height: auto; padding: 6mm; }
    }
  </style>
</head>
<body>

  <div class="no-print">
    <button class="btn btn-back" onclick="window.close()">✕ Cerrar</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
  </div>

  <div class="invoice-box">
    
    <div class="header">
      <div id="printLogoContainer"></div>
      <div class="company-details">
        <h1 class="company-name" id="printCompName">EMPRESA</h1>
        <p class="company-info" id="printCompInfo">
          Dirección Principal<br>Teléfono | Email
        </p>
      </div>
    </div>

    <div class="doc-title">Comprobante de Venta</div>

    <div class="sale-info">
      <div class="info-block">
        <div><strong>Cliente:</strong> <span id="printClient"></span></div>
        <div><strong>Atendió:</strong> <span id="printSeller"></span></div>
      </div>
      <div class="info-block">
        <div><strong>Ticket N°:</strong> <span id="printId"></span></div>
        <div><strong>Fecha:</strong> <span id="printDate"></span></div>
        <div><strong>Método:</strong> <span id="printMethod"></span> <span id="printCupon" style="font-size:8px; color:#64748b;"></span></div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 10%; text-align: center;">Cant</th>
          <th style="width: 50%;">Producto</th>
          <th style="width: 20%; text-align: right;">P. Unit</th>
          <th style="width: 20%; text-align: right;">Subt.</th>
        </tr>
      </thead>
      <tbody id="printItems"></tbody>
    </table>

    <div class="clearfix">
      <div class="totals-box">
        <div class="total-row">
          <span>Subtotal:</span>
          <span id="printSubtotal">$0</span>
        </div>
        <div class="total-row" id="rowDiscount" style="display:none; color: #dc2626;">
          <span>Desc:</span>
          <span id="printDiscount">-$0</span>
        </div>
        <div class="total-row grand-total">
          <span>TOTAL:</span>
          <span id="printTotal">$0</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <strong>Documento no válido como factura.</strong><br>
      Trabajos personalizados no admiten devoluciones. Gracias por elegirnos.
    </div>

  </div>

  <script>
    function currency(n) { return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(n || 0); }

    const compName = localStorage.getItem('company_name') || 'OPTICA TU VISIÓN';
    let compAddress = localStorage.getItem('company_address');
    let compPhone = localStorage.getItem('company_phone');
    let compEmail = localStorage.getItem('company_email');
    const compLogo = localStorage.getItem('company_logo');

    // Si los datos están vacíos en la base de datos o dicen "undefined", usamos los datos fijos de la óptica
    if (!compAddress || compAddress === 'undefined') compAddress = 'Av. Tissera 3510 B° El Talar - Mendiolaza';
    if (!compPhone || compPhone === 'undefined') compPhone = '351 2465138';
    if (!compEmail || compEmail === 'undefined') compEmail = '';

    document.getElementById('printCompName').textContent = compName;
    
    let infoHtml = '';
    if (compAddress) infoHtml += compAddress + '<br>';
    if (compPhone) infoHtml += 'Tel: ' + compPhone + ' ';
    if (compEmail) infoHtml += '| ' + compEmail;
    document.getElementById('printCompInfo').innerHTML = infoHtml;

    if (compLogo && compLogo !== 'undefined') {
      document.getElementById('printLogoContainer').innerHTML = `<img src="${compLogo}" class="company-logo" alt="Logo">`;
    }

    const venta = JSON.parse(localStorage.getItem('last_sale_to_print'));

    if (!venta) {
      alert("No hay datos para mostrar.");
      window.close();
    } else {
      document.getElementById('printId').textContent = venta.id.split('_')[1] || venta.id;
      document.getElementById('printDate').textContent = new Date(venta.createdAt).toLocaleString('es-AR');
      document.getElementById('printClient').textContent = venta.client || 'Consumidor Final';
      document.getElementById('printSeller').textContent = venta.seller || '-';
      document.getElementById('printMethod').textContent = venta.method;
      
      if (venta.cupon) {
        document.getElementById('printCupon').textContent = `(Lote: ${venta.cupon})`;
      }
      
      const itemsBody = document.getElementById('printItems');
      venta.items.forEach(i => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="text-align: center; font-weight: bold;">${i.qty}</td>
          <td>${i.name}</td>
          <td style="text-align: right; color: #64748b;">${currency(i.price)}</td>
          <td style="text-align: right; font-weight: bold;">${currency(i.subtotal)}</td>
        `;
        itemsBody.appendChild(tr);
      });

      document.getElementById('printSubtotal').textContent = currency(venta.subtotal);
      
      if (venta.promoDiscount > 0) {
        document.getElementById('rowDiscount').style.display = 'flex';
        document.getElementById('printDiscount').textContent = "-" + currency(venta.promoDiscount);
      }
      
      document.getElementById('printTotal').textContent = currency(venta.total);

      window.onload = () => {
        setTimeout(() => {
          window.print();
        }, 500); 
      };
    }
  </script>
</body>
</html>
