<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturación | Micro SaaS</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .app { display: grid !important; grid-template-columns: 260px 1fr !important; min-height: 100vh; width: 100vw; overflow-x: hidden; }
    .sidebar { width: 260px !important; height: 100vh; position: sticky; top: 0; }
    .pos-wrapper { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; align-items: start; }
    .pos-cart-panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); display: flex; flex-direction: column; min-height: 70vh; }
    .pos-search-box { padding: 20px; border-bottom: 1px solid var(--line); background: var(--panel-2); position: relative; }
    .pos-search-input { width: 100%; padding: 16px 20px; font-size: 16px; font-weight: 600; border: 2px solid var(--primary-soft); border-radius: 12px; outline: none; background: #fff; }
    .pos-search-input:focus { border-color: var(--primary); box-shadow: 0 4px 15px rgba(37,99,235,0.15); }
    .autocomplete-list { position: absolute; top: 100%; left: 20px; right: 20px; background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow-lg); z-index: 999; max-height: 300px; overflow-y: auto; display: none; margin-top: 5px; }
    .autocomplete-list.active { display: block; }
    .autocomplete-item { padding: 12px 16px; border-bottom: 1px solid var(--line); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .autocomplete-item.selected, .autocomplete-item:hover { background: var(--primary-soft); }
    .pos-table-container { flex: 1; overflow-y: auto; background: #fff; min-height: 250px; }
    .pos-table { width: 100%; border-collapse: collapse; text-align: left; }
    .pos-table th { background: var(--panel-2); padding: 12px 16px; font-size: 12px; color: var(--muted); text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
    .pos-table td { padding: 12px 16px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .pos-checkout-panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column; }
    .totals-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 12px; color: var(--muted); }
    .totals-row.grand-total { font-size: 36px; font-weight: 800; color: var(--text); border-top: 2px dashed var(--line); padding-top: 16px; margin-top: 8px; }
    .pay-methods { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
    .pay-btn { border: 2px solid var(--line); background: #fff; padding: 14px 8px; border-radius: 12px; font-weight: 800; color: var(--muted); cursor: pointer; text-align: center; font-size: 14px; transition: 0.2s; }
    .pay-btn.active { border-color: var(--primary); background: var(--primary-soft); color: var(--primary); }
    .pay-btn-b2b { grid-column: span 3; border-color: var(--warning); background: var(--warning-soft); color: #b45309; display: none; }
    .btn-charge { width: 100%; padding: 20px; font-size: 20px; font-weight: 800; border-radius: 12px; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3); background: var(--success); color: white; border: none; }
    .qty-control { display: flex; align-items: center; gap: 6px; }
    .qty-btn { background: var(--line); border: none; width: 28px; height: 28px; border-radius: 6px; font-weight: bold; cursor: pointer; display:grid; place-items:center; }
    .qty-input { width: 45px; text-align: center; border: 1px solid var(--line); border-radius: 6px; padding: 4px; font-weight: bold; outline:none; }
    #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 9999; justify-content: center; align-items: center; font-weight: bold; color: var(--primary); }
  </style>
</head>
<body>

<div id="loadingOverlay">Sincronizando...</div>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">M</div>
      <div class="brand-text"><strong>Usuario: Admin</strong><small>Control del negocio</small></div>
    </div>
    <nav class="nav">
      <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="producto.html"><span class="nav-icon">📦</span> Productos</a>
      <a href="clientes.html"><span class="nav-icon">🏢</span> Clientes</a>
      <a href="facturacion.html" class="active"><span class="nav-icon">🛒</span> Facturación</a>
      <a href="ventas.html"><span class="nav-icon">🧾</span> Ventas - Cierre de Caja</a>
      <a href="cc.html"><span class="nav-icon">📓</span> Cuentas Corrientes</a>
      <a href="contable.html"><span class="nav-icon">💸</span> Contable</a>
      <a href="stock.html"><span class="nav-icon">📚</span> Stock</a>
      <a href="usuarios.html"><span class="nav-icon">👥</span> Usuarios</a>
    </nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div class="page-title">
        <h1 style="margin:0; font-size: 24px;">Facturación</h1>
        <p style="margin:6px 0 0; color:var(--muted); font-size:14px;">Venta rápida y B2B en la nube.</p>
      </div>
      <button class="btn btn-light" onclick="cancelarVenta()">Vaciar Carrito</button>
    </header>

    <div class="pos-wrapper">
      <div class="pos-cart-panel">
        <div class="pos-search-box">
          <input type="text" id="posSearch" class="pos-search-input" placeholder="Buscá un producto..." autocomplete="off" autofocus>
          <div id="searchResults" class="autocomplete-list"></div>
        </div>
        <div class="pos-table-container">
          <table class="pos-table">
            <thead><tr><th>Producto</th><th>Precio</th><th style="text-align:center;">Cant.</th><th style="text-align:right;">Subtotal</th><th></th></tr></thead>
            <tbody id="cartBody"></tbody>
          </table>
        </div>
      </div>

      <div class="pos-checkout-panel">
        <div class="field" style="margin-bottom: 24px; position: relative;">
          <label style="font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block;">Cliente</label>
          <input type="hidden" id="clientId" value="">
          <input type="text" id="clientName" value="Consumidor Final" autocomplete="off" 
                 onfocus="this.value=''; verificarClienteLibre()" 
                 oninput="verificarClienteLibre()"
                 style="background: var(--panel-2); border: 1px solid var(--line); font-weight: 600; padding: 12px; width: 100%; border-radius: 10px; outline: none;">
          <div id="clientResults" class="autocomplete-list" style="left:0; right:0; top: 100%;"></div>
        </div>

        <div style="flex: 1;">
          <div class="totals-row"><span>Subtotal</span><span id="txtSubtotal">$0</span></div>
          <div class="totals-row" id="rowPromoDiscount" style="display: none; color: var(--danger);">
            <span>Ahorro</span><span id="txtPromoDiscount">-$0</span>
          </div>
          <div class="totals-row grand-total"><span>Total</span><span id="txtTotal" style="color: var(--primary);">$0</span></div>
        </div>

        <div style="margin-top: 30px;">
          <label style="display:block; margin-bottom:12px; font-size:12px; font-weight:700; color:var(--muted); text-transform: uppercase;">Método de Pago</label>
          <div class="pay-methods" id="payMethodsB2C">
            <button class="pay-btn active" onclick="setPayment('Efectivo', this)">💵 Efectivo</button>
            <button class="pay-btn" onclick="setPayment('Transferencia', this)">📱 Transf.</button>
            <button class="pay-btn" onclick="setPayment('Tarjeta', this)">💳 Tarjeta</button>
          </div>
          <div class="pay-methods" id="payMethodsB2B" style="display: none;">
            <button class="pay-btn pay-btn-b2b active" style="display: block;">📓 A Cuenta Corriente</button>
          </div>
          <button class="btn-charge" onclick="procesarVenta()">Cobrar e Imprimir (F12)</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="core.js"></script>
<script>
  const API_URL = "/api";
  let dbProducts = []; let dbClients = []; let cart = [];
  let currentPaymentMethod = 'Efectivo';
  let isB2B = false;
  let filteredProducts = []; let selectedSearchIndex = -1;

  function currency(n) { return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(n || 0); }
  function escapeHtml(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function mostrarCarga(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

  async function initPOS() {
    mostrarCarga(true);
    try {
      const [resP, resC] = await Promise.all([fetch(`${API_URL}/products`), fetch(`${API_URL}/clients`)]);
      if(resP.ok) dbProducts = await resP.json();
      if(resC.ok) dbClients = await resC.json();
      renderCart();
    } catch (e) { console.error(e); }
    finally { mostrarCarga(false); document.getElementById('posSearch').focus(); }
  }

  // Búsqueda de Productos
  const searchInput = document.getElementById('posSearch');
  const searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase().trim();
    if (term.length < 1) { searchResults.classList.remove('active'); return; }
    filteredProducts = dbProducts.filter(p => (p.name.toLowerCase().includes(term) || (p.sku && p.sku.toLowerCase().includes(term)))).slice(0, 10);
    renderSearchResults();
  });

  function renderSearchResults() {
    if (filteredProducts.length === 0) {
      searchResults.innerHTML = '<div style="padding:15px; text-align:center;">No hay stock o no existe</div>';
    } else {
      searchResults.innerHTML = filteredProducts.map((p, idx) => `
        <div class="autocomplete-item" onclick="agregarAlCarrito(filteredProducts[${idx}])">
          <div><strong>${escapeHtml(p.name)}</strong><br><small>Stock: ${p.stock}</small></div>
          <div style="font-weight:800; color:var(--success);">${currency(p.price)}</div>
        </div>
      `).join('');
    }
    searchResults.classList.add('active');
  }

  function agregarAlCarrito(prod) {
    const existe = cart.find(item => item.id === prod.id);
    if (existe) existe.qty++; else cart.unshift({ ...prod, qty: 1 });
    searchInput.value = ''; searchResults.classList.remove('active'); searchInput.focus(); renderCart();
  }

  // Búsqueda de Clientes
  const clientInput = document.getElementById('clientName');
  const clientResults = document.getElementById('clientResults');

  window.verificarClienteLibre = function() {
    const term = clientInput.value.toLowerCase().trim();
    if (term === "") { 
        document.getElementById('clientId').value = '';
        activarModoB2C(); 
    }
    
    if (term.length < 1) { clientResults.classList.remove('active'); return; }
    const filtrados = dbClients.filter(c => c.name.toLowerCase().includes(term) || (c.cuil && c.cuil.includes(term))).slice(0, 5);
    
    clientResults.innerHTML = filtrados.length === 0 ? '<div style="padding:15px; text-align:center;">Nuevo Consumidor Final</div>' : filtrados.map(c => `
        <div class="autocomplete-item" onclick="seleccionarClientePOS('${c.id}', '${escapeHtml(c.name)}')">
          <div><strong>${escapeHtml(c.name)}</strong><br><small>${c.cuil || 'Sin CUIT'}</small></div>
        </div>
      `).join('');
    clientResults.classList.add('active');
  };

  window.seleccionarClientePOS = function(id, name) {
    clientInput.value = name;
    document.getElementById('clientId').value = id;
    clientResults.classList.remove('active');
    activarModoB2B();
  };

  function activarModoB2C() {
    isB2B = false;
    document.getElementById('payMethodsB2C').style.display = 'grid';
    document.getElementById('payMethodsB2B').style.display = 'none';
    setPayment('Efectivo', document.querySelector('#payMethodsB2C .pay-btn'), false); // false = NO ROBAR FOCO
  }

  function activarModoB2B() {
    isB2B = true;
    currentPaymentMethod = 'A Cuenta Corriente';
    document.getElementById('payMethodsB2C').style.display = 'none';
    document.getElementById('payMethodsB2B').style.display = 'grid';
  }

  function setPayment(method, btnElement, debeEnfocar = true) {
    if (isB2B) return;
    currentPaymentMethod = method;
    document.querySelectorAll('#payMethodsB2C .pay-btn').forEach(b => b.classList.remove('active'));
    if(btnElement) btnElement.classList.add('active');
    if(debeEnfocar) searchInput.focus();
  }

  function renderCart() {
    const tbody = document.getElementById('cartBody');
    let subtotal = 0;
    tbody.innerHTML = cart.map(item => {
      const rowTotal = item.price * item.qty;
      subtotal += rowTotal;
      return `<tr>
        <td><strong>${escapeHtml(item.name)}</strong></td>
        <td>${currency(item.price)}</td>
        <td style="text-align:center;">${item.qty}</td>
        <td style="text-align:right;"><strong>${currency(rowTotal)}</strong></td>
        <td style="text-align:center;"><button onclick="quitar('${item.id}')" style="background:none; border:none; color:red; cursor:pointer;">✕</button></td>
      </tr>`;
    }).join('');
    if(cart.length === 0) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">Carrito vacío</td></tr>';
    document.getElementById('txtSubtotal').textContent = currency(subtotal);
    document.getElementById('txtTotal').textContent = currency(subtotal);
  }

  function quitar(id) { cart = cart.filter(x => x.id !== id); renderCart(); }
  function cancelarVenta() { if(confirm("¿Vaciar?")) { cart = []; renderCart(); } }

  async function procesarVenta() {
    if(cart.length === 0) return;
    mostrarCarga(true);
    const subtotal = cart.reduce((a, b) => a + (b.price * b.qty), 0);
    const cliente = clientInput.value || 'Consumidor Final';
    const cid = document.getElementById('clientId').value;

    const venta = {
      id: 'vta_' + Date.now(), createdAt: new Date().toISOString(),
      client: cliente, clientId: cid, method: currentPaymentMethod,
      subtotal: subtotal, promoDiscount: 0, total: subtotal, isB2B: isB2B,
      items: cart
    };

    try {
      const res = await fetch(`${API_URL}/sales`, { method: 'POST', body: JSON.stringify(venta) });
      if(res.ok) {
        alert("Venta guardada en la nube");
        cart = []; clientInput.value = 'Consumidor Final'; document.getElementById('clientId').value = '';
        activarModoB2C(); renderCart();
      }
    } catch(e) { alert("Error de red"); }
    finally { mostrarCarga(false); }
  }

  document.addEventListener('keydown', (e) => { if(e.key === 'F12') procesarVenta(); });
  initPOS();
</script>
</body>
</html>
