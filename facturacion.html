<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturación | Micro SaaS</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .app { display: grid !important; grid-template-columns: 260px 1fr !important; min-height: 100vh; width: 100vw; overflow-x: hidden; }
    .sidebar { width: 260px !important; height: 100vh; position: sticky; top: 0; }
    
    .pos-wrapper { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; align-items: start; }
    .pos-cart-panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); display: flex; flex-direction: column; min-height: 70vh; }
    .pos-search-box { padding: 20px; border-bottom: 1px solid var(--line); background: var(--panel-2); position: relative; }
    .pos-search-input { width: 100%; padding: 16px 20px; font-size: 16px; font-weight: 600; border: 2px solid var(--primary-soft); border-radius: 12px; outline: none; background: #fff; }
    .pos-search-input:focus { border-color: var(--primary); box-shadow: 0 4px 15px rgba(37,99,235,0.15); }

    .autocomplete-list { position: absolute; top: 100%; left: 20px; right: 20px; background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow-lg); z-index: 999; max-height: 300px; overflow-y: auto; display: none; margin-top: 5px; }
    .autocomplete-list.active { display: block; }
    .autocomplete-item { padding: 12px 16px; border-bottom: 1px solid var(--line); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .autocomplete-item.selected, .autocomplete-item:hover { background: var(--primary-soft); }
    .prod-promo { font-size: 11px; background: var(--warning-soft); color: var(--warning); padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 8px; }

    .pos-table-container { flex: 1; overflow-y: auto; background: #fff; min-height: 250px; }
    .pos-table { width: 100%; border-collapse: collapse; text-align: left; }
    .pos-table th { background: var(--panel-2); padding: 12px 16px; font-size: 12px; color: var(--muted); text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
    .pos-table td { padding: 12px 16px; border-bottom: 1px solid var(--line); vertical-align: middle; }

    .pos-checkout-panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column; }
    .totals-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 12px; color: var(--muted); }
    .totals-row.discount { color: var(--danger); font-weight: bold; }
    .totals-row.grand-total { font-size: 36px; font-weight: 800; color: var(--text); border-top: 2px dashed var(--line); padding-top: 16px; margin-top: 8px; }

    .pay-methods { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
    .pay-btn { border: 2px solid var(--line); background: #fff; padding: 14px 8px; border-radius: 12px; font-weight: 800; color: var(--muted); cursor: pointer; text-align: center; font-size: 14px; }
    .pay-btn.active { border-color: var(--primary); background: var(--primary-soft); color: var(--primary); }

    .btn-charge { width: 100%; padding: 20px; font-size: 20px; font-weight: 800; border-radius: 12px; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3); background: var(--success); color: white; border: none; }
    
    .qty-control { display: flex; align-items: center; gap: 6px; }
    .qty-btn { background: var(--line); border: none; width: 28px; height: 28px; border-radius: 6px; font-weight: bold; cursor: pointer; display:grid; place-items:center; }
    .qty-input { width: 45px; text-align: center; border: 1px solid var(--line); border-radius: 6px; padding: 4px; font-weight: bold; outline:none; }

    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    #printTicketArea { display: none; }
    @media print {
      @page { margin: 0; size: 80mm auto; }
      body { margin: 0; background: #fff; }
      body * { visibility: hidden; }
      #printTicketArea, #printTicketArea * { visibility: visible; }
      #printTicketArea { position: absolute; left: 0; top: 0; width: 80mm; font-family: monospace; font-size: 12px; padding: 5mm; color: #000; display: block !important; }
      .ticket-header { text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 16px; }
      .ticket-line { display: flex; justify-content: space-between; margin-bottom: 5px; }
      .ticket-divider { border-top: 1px dashed #000; margin: 10px 0; }
    }
  </style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">M</div>
      <div class="brand-text"><strong>Usuario: Admin</strong><small>Control del negocio</small></div>
    </div>
    <nav class="nav">
      <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="producto.html"><span class="nav-icon">📦</span> Productos</a>
      <a href="facturacion.html" class="active"><span class="nav-icon">🛒</span> Facturación</a>
      <a href="ventas.html"><span class="nav-icon">🧾</span> Ventas - Cierre de Caja</a>
      <a href="contable.html"><span class="nav-icon">💸</span> Contable</a>
      <a href="stock.html"><span class="nav-icon">📚</span> Stock</a>
      <a href="usuarios.html"><span class="nav-icon">👥</span> Usuarios</a>
    </nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div class="page-title">
        <h1 style="margin:0; font-size: 24px;">Facturación</h1>
        <p style="margin:6px 0 0; color:var(--muted); font-size:14px;">Emisión rápida y motor de ofertas automáticas.</p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-outline" onclick="cancelarVenta()">Vaciar Carrito</button>
      </div>
    </header>

    <div class="pos-wrapper">
      <div class="pos-cart-panel">
        <div class="pos-search-box">
          <input type="text" id="posSearch" class="pos-search-input" placeholder="Buscá por nombre, código o escaneá..." autocomplete="off" autofocus>
          <div id="searchResults" class="autocomplete-list"></div>
        </div>

        <div class="pos-table-container">
          <table class="pos-table">
            <thead>
              <tr>
                <th>Producto</th>
                <th style="width: 100px;">Precio</th>
                <th style="width: 120px; text-align: center;">Cant.</th>
                <th style="width: 100px; text-align: right;">Subtotal</th>
                <th style="width: 40px;"></th>
              </tr>
            </thead>
            <tbody id="cartBody"></tbody>
          </table>
        </div>
      </div>

      <div class="pos-checkout-panel">
        <div class="field" style="margin-bottom: 24px; position: relative;">
          <label style="font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block;">Cliente</label>
          <input type="hidden" id="clientId" value="">
          <input type="text" id="clientName" value="Consumidor Final" autocomplete="off" style="background: var(--panel-2); border: 1px solid var(--line); font-weight: 600; padding: 12px; width: 100%; border-radius: 10px; outline: none;">
          <div id="clientResults" class="autocomplete-list" style="left:0; right:0; top: 100%;"></div>
        </div>

        <div style="flex: 1;">
          <div class="totals-row"><span>Subtotal bruto</span><span id="txtSubtotal">$0</span></div>
          <div class="totals-row" id="rowPromoDiscount" style="display: none; color: var(--danger); font-weight: bold;">
            <span>Ahorro Promociones</span><span id="txtPromoDiscount">-$0</span>
          </div>
          <div class="totals-row grand-total"><span>Total a Pagar</span><span id="txtTotal" style="color: var(--primary);">$0</span></div>
        </div>

        <div style="margin-top: 30px;">
          <label style="display:block; margin-bottom:12px; font-size:12px; font-weight:700; color:var(--muted); text-transform: uppercase;">Método de Pago</label>
          <div class="pay-methods">
            <button class="pay-btn active" onclick="setPayment('Efectivo', this)">💵 Efectivo</button>
            <button class="pay-btn" onclick="setPayment('Transferencia', this)">📱 Transf.</button>
            <button class="pay-btn" onclick="setPayment('Tarjeta', this)">💳 Tarjeta</button>
          </div>

          <div id="cuponContainer" style="display: none; margin-bottom: 15px;">
            <label style="font-size: 11px; color: var(--danger); text-transform: uppercase; font-weight:bold;">Número de Cupón *</label>
            <input type="number" id="cuponNumber" placeholder="Ingresá los números" style="background: #fff; border: 2px solid var(--line); font-weight: 600; padding: 14px; width: 100%; box-sizing: border-box; margin-top: 6px; border-radius: 10px;">
          </div>

          <button class="btn-charge" onclick="procesarVenta()">Cobrar e Imprimir (F12)</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="printTicketArea"></div>

<script src="core.js"></script>
<script>
  let dbProducts = []; let dbSales = []; let cart = [];
  let dbClients = []; // Agregado para el buscador de clientes
  let currentPaymentMethod = 'Efectivo';
  let filteredProducts = []; let selectedSearchIndex = -1;

  function escapeHtml(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function currency(n) { return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(n || 0); }
  function todayISO() { return new Date().toISOString().split('T')[0]; }

  function initPOS() {
    dbProducts = getData(KEYS.products, []); 
    dbSales = getData(KEYS.sales, []);
    
    // Cargar clientes en la memoria de la caja
    const keyCli = (typeof KEYS !== 'undefined' && KEYS.clients) ? KEYS.clients : 'saas_clients';
    dbClients = getData(keyCli, []);

    renderCart(); document.getElementById('posSearch').focus();
  }

  // ── BUSCADOR DE PRODUCTOS ──
  const searchInput = document.getElementById('posSearch');
  const searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase().trim();
    if (term.length < 1) { searchResults.classList.remove('active'); return; }
    filteredProducts = dbProducts.filter(p => (p.name.toLowerCase().includes(term) || (p.code && p.code.toLowerCase().includes(term))) && p.stock > 0).slice(0, 10);
    renderSearchResults();
  });

  searchInput.addEventListener('keydown', (e) => {
    if (!searchResults.classList.contains('active')) return;
    const items = document.querySelectorAll('#searchResults .autocomplete-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); selectedSearchIndex = (selectedSearchIndex + 1) % items.length; updateSearchSelection(items); } 
    else if (e.key === 'ArrowUp') { e.preventDefault(); selectedSearchIndex = (selectedSearchIndex - 1 + items.length) % items.length; updateSearchSelection(items); } 
    else if (e.key === 'Enter') {
      e.preventDefault();
      if (selectedSearchIndex >= 0 && selectedSearchIndex < filteredProducts.length) agregarAlCarrito(filteredProducts[selectedSearchIndex]); 
      else if (filteredProducts.length > 0) agregarAlCarrito(filteredProducts[0]);
    }
  });

  // ── NUEVO: BUSCADOR DE CLIENTES ──
  const clientInput = document.getElementById('clientName');
  const clientResults = document.getElementById('clientResults');

  clientInput.addEventListener('input', (e) => {
    document.getElementById('clientId').value = ''; // Resetea el ID si borra a mano
    const term = e.target.value.toLowerCase().trim();
    if (term.length < 1) { clientResults.classList.remove('active'); return; }
    
    const filtrados = dbClients.filter(c => c.name.toLowerCase().includes(term) || (c.cuit && c.cuit.toLowerCase().includes(term))).slice(0, 5);
    
    if (filtrados.length === 0) {
      clientResults.innerHTML = '<div style="padding:15px; color:var(--muted); text-align:center;">Cliente no encontrado</div>';
    } else {
      clientResults.innerHTML = filtrados.map(c => `
        <div class="autocomplete-item" onclick="seleccionarClientePOS('${c.id}', '${escapeHtml(c.name)}')">
          <div>
            <div style="font-weight:700;">${escapeHtml(c.name)}</div>
            <div style="font-size:12px; color:var(--muted);">${c.cuit ? 'CUIT: ' + escapeHtml(c.cuit) : c.type}</div>
          </div>
        </div>
      `).join('');
    }
    clientResults.classList.add('active');
  });

  window.seleccionarClientePOS = function(id, name) {
    clientInput.value = name;
    document.getElementById('clientId').value = id;
    clientResults.classList.remove('active');
  };

  // Ocultar desplegables si hacemos clic afuera
  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) { searchResults.classList.remove('active'); }
    if (!clientInput.contains(e.target) && !clientResults.contains(e.target)) { clientResults.classList.remove('active'); }
  });

  // ── FIN BUSCADOR CLIENTES ──

  function renderSearchResults() {
    if (filteredProducts.length === 0) {
      searchResults.innerHTML = '<div style="padding:15px; color:var(--danger); text-align:center; font-weight:bold;">Sin stock o no existe</div>';
    } else {
      searchResults.innerHTML = filteredProducts.map((p, idx) => {
        let promoTag = '';
        if(p.promoType && p.promoType !== 'none') promoTag = `<div class="prod-promo">PROMO ACTIVA</div>`;
        return `
        <div class="autocomplete-item" onclick="agregarAlCarrito(filteredProducts[${idx}])">
          <div>
            <div style="font-weight:700;">${escapeHtml(p.name)}</div>
            <div style="font-size:12px; color:var(--muted);">Stock: <strong>${p.stock}</strong></div>
          </div>
          <div style="text-align:right;">
            <div style="font-weight:800; color:var(--success); font-size:15px;">${currency(p.price)}</div>
            ${promoTag}
          </div>
        </div>
      `}).join('');
    }
    searchResults.classList.add('active'); selectedSearchIndex = -1;
  }

  function updateSearchSelection(items) {
    items.forEach(item => item.classList.remove('selected'));
    if (selectedSearchIndex >= 0) {
      items[selectedSearchIndex].classList.add('selected');
      items[selectedSearchIndex].scrollIntoView({ block: "nearest" });
    }
  }

  function agregarAlCarrito(prod) {
    const existe = cart.find(item => item.id === prod.id);
    if (existe) { if (existe.qty < prod.stock) existe.qty++; else alert("Límite de stock."); } 
    else { cart.unshift({ ...prod, qty: 1 }); }
    searchInput.value = ''; searchResults.classList.remove('active'); searchInput.focus(); renderCart();
  }

  function modificarCantidad(id, delta) {
    const item = cart.find(x => x.id === id);
    if (!item) return;
    const nueva = item.qty + delta;
    if (nueva < 1) return; 
    if (nueva > item.stock) return alert("Sin stock suficiente.");
    item.qty = nueva; renderCart();
  }

  window.setCantidadManual = function(id, value) {
    const item = cart.find(x => x.id === id);
    if (!item) return;
    let num = parseInt(value);
    if (isNaN(num) || num < 1) num = 1;
    if (num > item.stock) { alert("Supera el stock (" + item.stock + ")."); num = item.stock; }
    item.qty = num; renderCart();
  }

  function quitarDelCarrito(id) { cart = cart.filter(x => x.id !== id); renderCart(); searchInput.focus(); }
  function cancelarVenta() { if (confirm("¿Vaciar carrito?")) { cart = []; renderCart(); searchInput.focus(); } }

  function calcularTotales() {
    let subtotal = 0, promoDiscountTotal = 0;
    
    cart.forEach(item => { item.promoApplied = 0; subtotal += (item.price * item.qty); });

    cart.forEach(item => {
      let d = 0;
      const type = item.promoType;
      const val = parseFloat(item.promoValue) || 0;

      if (type === '2x1') { d = Math.floor(item.qty / 2) * item.price; } 
      else if (type === '2da_unidad') { d = Math.floor(item.qty / 2) * (item.price * (val / 100)); } 
      else if (type === 'descuento_directo') { d = (item.price * item.qty) * (val / 100); } 
      else if (type === 'combo' && item.promoLinked) {
        const linkedItem = cart.find(c => c.id === item.promoLinked);
        if (linkedItem) {
          const cantCombosFormados = Math.min(item.qty, linkedItem.qty);
          d = cantCombosFormados * (item.price * (val / 100));
        }
      }
      
      item.promoApplied = d;
      promoDiscountTotal += d;
    });

    return { subtotal, promoDiscountTotal, totalPagar: Math.max(0, subtotal - promoDiscountTotal) };
  }

  function renderCart() {
    const tbody = document.getElementById('cartBody');
    const { subtotal, promoDiscountTotal, totalPagar } = calcularTotales();

    if (cart.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5"><div style="text-align:center; color:var(--muted); padding:40px 10px;">El carrito está vacío.<br><small>Buscá un producto o presioná F2.</small></div></td></tr>';
    } else {
      tbody.innerHTML = cart.map(item => {
        let tagHtml = '';
        if (item.promoApplied > 0) {
          let razon = '';
          if(item.promoType === '2x1') razon = '2x1 Aplicado';
          if(item.promoType === '2da_unidad') razon = `2da al ${item.promoValue}% OFF`;
          if(item.promoType === 'descuento_directo') razon = `${item.promoValue}% OFF`;
          if(item.promoType === 'combo') razon = `COMBO: ${item.promoValue}% OFF`;
          tagHtml = `<div style="font-size:10px; color:var(--danger); font-weight:bold; background:#fee2e2; display:inline-block; padding:2px 6px; border-radius:4px; margin-top:4px;">${razon}: -${currency(item.promoApplied)}</div>`;
        }

        return `
        <tr>
          <td>
            <div style="font-weight: 700; font-size:14px;">${escapeHtml(item.name)}</div>
            <div style="font-size: 11px; color: var(--muted);">${item.code || ''}</div>
            ${tagHtml}
          </td>
          <td><strong style="color:var(--muted); font-size:13px;">${currency(item.price)}</strong></td>
          <td>
            <div class="qty-control" style="justify-content:center;">
              <button class="qty-btn" onclick="modificarCantidad('${item.id}', -1)" tabindex="-1">-</button>
              <input type="number" class="qty-input" value="${item.qty}" min="1" onchange="setCantidadManual('${item.id}', this.value)">
              <button class="qty-btn" onclick="modificarCantidad('${item.id}', 1)" tabindex="-1">+</button>
            </div>
          </td>
          <td style="text-align: right;"><strong>${currency((item.price * item.qty) - (item.promoApplied||0))}</strong></td>
          <td style="text-align: center;"><button class="btn" style="background:#fee2e2; border:none; border-radius:8px; padding:6px; color:var(--danger); cursor:pointer;" onclick="quitarDelCarrito('${item.id}')" tabindex="-1">✕</button></td>
        </tr>`;
      }).join('');
    }

    document.getElementById('txtSubtotal').textContent = currency(subtotal);
    document.getElementById('rowPromoDiscount').style.display = promoDiscountTotal > 0 ? 'flex' : 'none';
    if(promoDiscountTotal > 0) document.getElementById('txtPromoDiscount').textContent = '-' + currency(promoDiscountTotal);
    document.getElementById('txtTotal').textContent = currency(totalPagar);
  }

  function setPayment(method, btnElement) {
    currentPaymentMethod = method;
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active'); 
    const cuponContainer = document.getElementById('cuponContainer');
    if (method === 'Tarjeta') { cuponContainer.style.display = 'block'; document.getElementById('cuponNumber').focus(); } 
    else { cuponContainer.style.display = 'none'; document.getElementById('cuponNumber').value = ''; searchInput.focus(); }
  }

  function generarTicketHTML(venta) {
    let itemsHTML = venta.items.map(i => `
      <div class="ticket-line">
        <span style="width: 65%; overflow:hidden;">${i.qty}x ${i.name.substring(0,18)}</span>
        <span>${currency(i.subtotal)}</span>
      </div>
    `).join('');

    return `
      <div class="ticket-header">
        <div>MI NEGOCIO</div>
        <div style="font-size:12px; font-weight:normal;">Comprobante X</div>
      </div>
      <div style="margin-bottom:10px;">Fecha: ${new Date(venta.createdAt).toLocaleString('es-AR')}</div>
      <div style="margin-bottom:10px; font-weight:bold;">Cliente: ${escapeHtml(venta.client)}</div>
      <div class="ticket-divider"></div>
      ${itemsHTML}
      <div class="ticket-divider"></div>
      <div class="ticket-line"><span>SUBTOTAL</span><span>${currency(venta.subtotal)}</span></div>
      ${venta.promoDiscount > 0 ? `<div class="ticket-line"><span>DESCUENTOS</span><span>-${currency(venta.promoDiscount)}</span></div>` : ''}
      <div class="ticket-divider"></div>
      <div class="ticket-line" style="font-size:16px; font-weight:bold;"><span>TOTAL</span><span>${currency(venta.total)}</span></div>
      <div style="margin-top:10px;">Método: ${venta.method} ${venta.cupon ? `(Cupón: ${venta.cupon})` : ''}</div>
      <div class="ticket-divider"></div>
      <div style="text-align:center;">¡Gracias por su compra!</div>
    `;
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'F12') { e.preventDefault(); procesarVenta(); }
    if (e.key === 'F2') { e.preventDefault(); searchInput.focus(); }
  });

  function procesarVenta() {
    if (cart.length === 0) return;
    if (!confirm("¿Confirmar venta e imprimir ticket?")) return;

    let cuponText = '';
    if (currentPaymentMethod === 'Tarjeta') {
      cuponText = document.getElementById('cuponNumber').value.trim();
      if (!cuponText || isNaN(cuponText)) { alert("⚠️ Ingresá el número de cupón numérico."); document.getElementById('cuponNumber').focus(); return; }
    }

    const { subtotal, promoDiscountTotal, totalPagar } = calcularTotales();
    const cliente = document.getElementById('clientName').value.trim() || 'Consumidor Final';
    const clienteId = document.getElementById('clientId').value;

    const nuevaVenta = {
      id: 'vta_' + Date.now(), date: todayISO(), createdAt: new Date().toISOString(), 
      client: cliente, clientId: clienteId, // Acá guarda el ID
      method: currentPaymentMethod, cupon: cuponText, subtotal: subtotal, promoDiscount: promoDiscountTotal, total: totalPagar,
      items: cart.map(i => ({ id: i.id, name: i.name, code: i.code, price: i.price, qty: i.qty, subtotal: (i.price * i.qty) - (i.promoApplied||0) }))
    };

    dbSales.unshift(nuevaVenta); setData(KEYS.sales, dbSales);
    cart.forEach(cartItem => { const pDB = dbProducts.find(p => p.id === cartItem.id); if (pDB) pDB.stock -= cartItem.qty; });
    setData(KEYS.products, dbProducts); window.dispatchEvent(new Event('saas:data-updated'));

    document.getElementById('printTicketArea').innerHTML = generarTicketHTML(nuevaVenta);
    window.print();
    
    // Limpieza post-venta
    cart = []; 
    document.getElementById('clientName').value = 'Consumidor Final';
    document.getElementById('clientId').value = '';
    if(currentPaymentMethod === 'Tarjeta') document.getElementById('cuponNumber').value = '';
    renderCart(); searchInput.focus();
  }

  initPOS();
</script>
</body>
</html>
