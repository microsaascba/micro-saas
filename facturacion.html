<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturación | Micro SaaS</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Aseguramos la grilla principal para que el menú no se mueva */
    .app { 
      display: grid !important; 
      grid-template-columns: 260px 1fr !important; 
      min-height: 100vh; 
      width: 100vw; 
      overflow-x: hidden; 
    }
    
    .sidebar { 
      width: 260px !important; 
      height: 100vh; 
      position: sticky; 
      top: 0; 
      background: #0f172a; 
    }

    /* Layout del Punto de Venta */
    .pos-wrapper { 
      display: grid; 
      grid-template-columns: 1.8fr 1fr; 
      gap: 20px; 
      align-items: start; 
    }

    .pos-cart-panel { 
      background: var(--panel); 
      border: 1px solid var(--line); 
      border-radius: var(--radius); 
      display: flex; 
      flex-direction: column; 
      min-height: 70vh; 
      box-shadow: var(--shadow);
    }

    .pos-search-box { 
      padding: 20px; 
      border-bottom: 1px solid var(--line); 
      background: var(--panel-2); 
      position: relative; 
    }

    .pos-search-input { 
      width: 100%; 
      padding: 16px 20px; 
      font-size: 16px; 
      font-weight: 600; 
      border: 2px solid var(--primary-soft); 
      border-radius: 12px; 
      outline: none; 
      background: #fff; 
    }

    .autocomplete-list { 
      position: absolute; top: 100%; left: 20px; right: 20px; 
      background: #fff; border: 1px solid var(--line); border-radius: 12px; 
      box-shadow: var(--shadow-lg); z-index: 999; max-height: 300px; overflow-y: auto; 
      display: none; margin-top: 5px; 
    }
    .autocomplete-list.active { display: block; }
    .autocomplete-item { padding: 12px 16px; border-bottom: 1px solid var(--line); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .autocomplete-item.selected, .autocomplete-item:hover { background: var(--primary-soft); }

    .pos-table-container { flex: 1; overflow-y: auto; background: #fff; min-height: 250px; }
    .pos-table { width: 100%; border-collapse: collapse; text-align: left; }
    .pos-table th { background: var(--panel-2); padding: 12px 16px; font-size: 11px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--line); position: sticky; top: 0; }
    .pos-table td { padding: 12px 16px; border-bottom: 1px solid var(--line); vertical-align: middle; font-size: 14px; }

    .pos-checkout-panel { 
      background: var(--panel); 
      border: 1px solid var(--line); 
      border-radius: var(--radius); 
      padding: 24px; 
      display: flex; 
      flex-direction: column; 
      box-shadow: var(--shadow);
    }

    .totals-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 12px; color: var(--muted); }
    .totals-row.grand-total { font-size: 36px; font-weight: 800; color: var(--text); border-top: 2px dashed var(--line); padding-top: 16px; margin-top: 8px; }

    .pay-methods { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .pay-btn { border: 2px solid var(--line); background: #fff; padding: 14px 8px; border-radius: 12px; font-weight: 800; color: var(--muted); cursor: pointer; text-align: center; font-size: 13px; }
    .pay-btn.active { border-color: var(--primary); background: var(--primary-soft); color: var(--primary); }

    .btn-charge { width: 100%; padding: 20px; font-size: 20px; font-weight: 800; border-radius: 12px; margin-top: 10px; cursor: pointer; background: var(--success); color: white; border: none; }
    
    .qty-control { display: flex; align-items: center; gap: 6px; }
    .qty-btn { background: var(--line); border: none; width: 28px; height: 28px; border-radius: 6px; font-weight: bold; cursor: pointer; display: grid; place-items: center; }
    .qty-input { width: 45px; text-align: center; border: 1px solid var(--line); border-radius: 6px; padding: 4px; font-weight: bold; outline:none; }

    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    @media (max-width: 1000px) {
      .app { grid-template-columns: 1fr !important; }
      .pos-wrapper { grid-template-columns: 1fr; }
      .sidebar { display: none; } /* En móvil se activaría el menú hamburguesa si lo tenés configurado */
    }
  </style>
</head>
<body>

<div class="app">
  
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">M</div>
      <div class="brand-text"><strong>Usuario: caja1</strong><small>Control del negocio</small></div>
    </div>
    <nav class="nav">
      <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="producto.html"><span class="nav-icon">📦</span> Productos</a>
      <a href="facturacion.html" class="active"><span class="nav-icon">🛒</span> Facturación</a>
      <a href="ventas.html"><span class="nav-icon">🧾</span> Ventas y Caja</a>
      <a href="contable.html"><span class="nav-icon">💸</span> Contable</a>
      <a href="stock.html"><span class="nav-icon">📚</span> Stock</a>
      
      <a href="login.html" style="color: #ef4444; margin-top: 30px;"><span class="nav-icon">🚪</span> Cerrar sesión</a>
    </nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div class="page-title">
        <h1 style="margin:0; font-size: 26px;">Facturación</h1>
        <p style="margin:6px 0 0; color:var(--muted); font-size:14px;">Emisión rápida de comprobantes y control de stock en tiempo real.</p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-outline" onclick="cancelarVenta()">Vaciar Carrito</button>
      </div>
    </header>

    <div class="pos-wrapper">
      <div class="pos-cart-panel">
        <div class="pos-search-box">
          <input type="text" id="posSearch" class="pos-search-input" placeholder="Buscá por nombre, código o escaneá..." autocomplete="off" autofocus>
          <div id="searchResults" class="autocomplete-list"></div>
        </div>

        <div class="pos-table-container">
          <table class="pos-table">
            <thead>
              <tr>
                <th>Producto</th>
                <th style="width: 100px;">Precio</th>
                <th style="width: 120px; text-align: center;">Cant.</th>
                <th style="width: 100px; text-align: right;">Subtotal</th>
                <th style="width: 40px;"></th>
              </tr>
            </thead>
            <tbody id="cartBody">
              </tbody>
          </table>
        </div>
      </div>

      <div class="pos-checkout-panel">
        <div class="field" style="margin-bottom: 24px;">
          <label style="font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block;">Cliente</label>
          <input type="text" id="clientName" value="Consumidor Final" style="background: var(--panel-2); border: 1px solid var(--line); font-weight: 600; padding: 12px; width: 100%; border-radius: 10px; outline: none;">
        </div>

        <div style="flex: 1;">
          <div class="totals-row"><span>Subtotal</span><span id="txtSubtotal">$0</span></div>
          <div class="totals-row" id="rowPromoDiscount" style="display: none; color: var(--danger); font-weight: bold;">
            <span>Ahorro Promos</span><span id="txtPromoDiscount">-$0</span>
          </div>
          <div class="totals-row grand-total"><span>Total</span><span id="txtTotal" style="color: var(--primary);">$0</span></div>
        </div>

        <div style="margin-top: 30px;">
          <label style="display:block; margin-bottom:12px; font-size:12px; font-weight:700; color:var(--muted); text-transform: uppercase;">Método de Pago</label>
          <div class="pay-methods">
            <button class="pay-btn active" onclick="setPayment('Efectivo', this)">💵 Efectivo</button>
            <button class="pay-btn" onclick="setPayment('Transferencia', this)">📱 Transf.</button>
            <button class="pay-btn" onclick="setPayment('Tarjeta', this)">💳 Tarjeta</button>
          </div>

          <div id="cuponContainer" style="display: none; margin-bottom: 15px;">
            <label style="font-size: 11px; color: var(--danger); text-transform: uppercase; font-weight:bold;">Número de Cupón *</label>
            <input type="number" id="cuponNumber" placeholder="Ingresá los números" style="background: #fff; border: 2px solid var(--line); font-weight: 600; padding: 14px; width: 100%; box-sizing: border-box; margin-top: 6px; border-radius: 10px;">
          </div>

          <button class="btn-charge" onclick="procesarVenta()">Cobrar e Imprimir</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="core.js"></script>
<script>
  let dbProducts = []; let dbSales = []; let cart = [];
  let currentPaymentMethod = 'Efectivo';
  let filteredProducts = []; let selectedSearchIndex = -1;

  function currency(n) { return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(n || 0); }
  function todayISO() { return new Date().toISOString().split('T')[0]; }

  function initPOS() {
    dbProducts = getData(KEYS.products, []); 
    dbSales = getData(KEYS.sales, []);
    renderCart();
  }

  const searchInput = document.getElementById('posSearch');
  const searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase().trim();
    if (term.length < 1) { searchResults.classList.remove('active'); return; }
    filteredProducts = dbProducts.filter(p => (p.name.toLowerCase().includes(term) || (p.code && p.code.toLowerCase().includes(term))) && p.stock > 0).slice(0, 10);
    renderSearchResults();
  });

  searchInput.addEventListener('keydown', (e) => {
    if (!searchResults.classList.contains('active')) return;
    const items = document.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); selectedSearchIndex = (selectedSearchIndex + 1) % items.length; updateSearchSelection(items); } 
    else if (e.key === 'ArrowUp') { e.preventDefault(); selectedSearchIndex = (selectedSearchIndex - 1 + items.length) % items.length; updateSearchSelection(items); } 
    else if (e.key === 'Enter') {
      e.preventDefault();
      if (selectedSearchIndex >= 0 && selectedSearchIndex < filteredProducts.length) { agregarAlCarrito(filteredProducts[selectedSearchIndex]); } 
      else if (filteredProducts.length > 0) { agregarAlCarrito(filteredProducts[0]); }
    }
  });

  function renderSearchResults() {
    if (filteredProducts.length === 0) {
      searchResults.innerHTML = '<div style="padding:15px; color:var(--danger); text-align:center;">Sin stock o no existe</div>';
    } else {
      searchResults.innerHTML = filteredProducts.map((p, idx) => `
        <div class="autocomplete-item" onclick="agregarAlCarrito(filteredProducts[${idx}])">
          <div>
            <div style="font-weight:700;">${p.name}</div>
            <div style="font-size:12px; color:var(--muted);">Stock: <strong>${p.stock}</strong></div>
          </div>
          <div style="font-weight:800; color:var(--success);">${currency(p.price)}</div>
        </div>
      `).join('');
    }
    searchResults.classList.add('active');
  }

  function updateSearchSelection(items) {
    items.forEach(item => item.classList.remove('selected'));
    if (selectedSearchIndex >= 0) items[selectedSearchIndex].classList.add('selected');
  }

  function agregarAlCarrito(prod) {
    const existe = cart.find(item => item.id === prod.id);
    if (existe) { if (existe.qty < prod.stock) existe.qty++; else alert("Límite de stock."); } 
    else { cart.unshift({ ...prod, qty: 1 }); }
    searchInput.value = ''; searchResults.classList.remove('active'); searchInput.focus(); renderCart();
  }

  function modificarCantidad(id, delta) {
    const item = cart.find(x => x.id === id);
    if (!item) return;
    const nueva = item.qty + delta;
    if (nueva < 1) return;
    if (nueva > item.stock) return alert("Sin stock suficiente.");
    item.qty = nueva; renderCart();
  }

  window.setCantidadManual = function(id, value) {
    const item = cart.find(x => x.id === id);
    if (!item) return;
    let num = parseInt(value);
    if (isNaN(num) || num < 1) num = 1;
    if (num > item.stock) num = item.stock;
    item.qty = num; renderCart();
  }

  function quitarDelCarrito(id) { cart = cart.filter(x => x.id !== id); renderCart(); }
  function cancelarVenta() { if (confirm("¿Vaciar carrito?")) { cart = []; renderCart(); } }

  function renderCart() {
    const tbody = document.getElementById('cartBody');
    let subtotal = 0, promoDesc = 0;

    cart.forEach(item => {
      const itemSub = item.price * item.qty; subtotal += itemSub;
      let d = 0;
      if (item.promoType === '2x1') d = Math.floor(item.qty / 2) * item.price;
      else if (item.promoType === '50_second') d = Math.floor(item.qty / 2) * (item.price * 0.5);
      else if (item.promoType === 'desc_10') d = itemSub * 0.10;
      item.promoApplied = d; promoDesc += d;
    });

    if (cart.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--muted);">Carrito vacío.</td></tr>';
    } else {
      tbody.innerHTML = cart.map(item => `
        <tr>
          <td><div style="font-weight:700;">${item.name}</div><div style="font-size:11px; color:var(--muted);">${item.code || ''}</div></td>
          <td>${currency(item.price)}</td>
          <td>
            <div class="qty-control">
              <button class="qty-btn" onclick="modificarCantidad('${item.id}', -1)">-</button>
              <input type="number" class="qty-input" value="${item.qty}" onchange="setCantidadManual('${item.id}', this.value)">
              <button class="qty-btn" onclick="modificarCantidad('${item.id}', 1)">+</button>
            </div>
          </td>
          <td style="text-align:right;"><strong>${currency((item.price * item.qty) - item.promoApplied)}</strong></td>
          <td style="text-align:center;"><button onclick="quitarDelCarrito('${item.id}')" style="background:#fee2e2; border:none; border-radius:50%; width:28px; height:28px; color:var(--danger); cursor:pointer;">✕</button></td>
        </tr>`).join('');
    }

    document.getElementById('txtSubtotal').textContent = currency(subtotal);
    document.getElementById('rowPromoDiscount').style.display = promoDesc > 0 ? 'flex' : 'none';
    document.getElementById('txtPromoDiscount').textContent = '-' + currency(promoDesc);
    document.getElementById('txtTotal').textContent = currency(subtotal - promoDesc);
  }

  function setPayment(method, btn) {
    currentPaymentMethod = method;
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('cuponContainer').style.display = method === 'Tarjeta' ? 'block' : 'none';
  }

  function procesarVenta() {
    if (cart.length === 0) return;
    let cupon = "";
    if (currentPaymentMethod === 'Tarjeta') {
      cupon = document.getElementById('cuponNumber').value;
      if (!cupon) return alert("Número de cupón obligatorio.");
    }

    const { total } = { total: cart.reduce((a,b) => a + (b.price * b.qty - b.promoApplied), 0) };
    const nuevaVenta = {
      id: 'vta_' + Date.now(), date: todayISO(), createdAt: new Date().toISOString(), client: document.getElementById('clientName').value,
      method: currentPaymentMethod, cupon, subtotal: cart.reduce((a,b)=>a+(b.price*b.qty),0), 
      promoDiscount: cart.reduce((a,b)=>a+b.promoApplied,0), total,
      items: cart.map(i => ({ id: i.id, name: i.name, qty: i.qty, subtotal: (i.price * i.qty) - i.promoApplied }))
    };

    dbSales.unshift(nuevaVenta); setData(KEYS.sales, dbSales);
    cart.forEach(c => { const p = dbProducts.find(x => x.id === c.id); if(p) p.stock -= c.qty; });
    setData(KEYS.products, dbProducts);
    localStorage.setItem('last_sale_to_print', JSON.stringify(nuevaVenta));
    window.location.href = 'factura.html';
  }

  initPOS();
</script>
</body>
</html>
